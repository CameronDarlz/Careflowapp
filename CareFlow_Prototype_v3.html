<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareFlow</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0D1F3C;--teal:#0D9488;--teal-l:#F0FDFA;--teal-m:#CCFBF1;
  --slate:#64748B;--slate-l:#F1F5F9;--border:#E2E8F0;
  --red:#DC2626;--red-l:#FEF2F2;
  --amber:#F59E0B;--amber-l:#FFFBEB;
  --green:#10B981;--green-l:#F0FDF4;
  --purple:#8B5CF6;--purple-l:#F5F3FF;
  --bg:#F8FAFC;--text:#1E293B;
  --sh-sm:0 1px 2px rgba(0,0,0,.05),0 1px 3px rgba(0,0,0,.04);
  --sh:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.04);
  --sh-lg:0 10px 25px -5px rgba(0,0,0,.1),0 4px 6px -2px rgba(0,0,0,.04);
  --sh-xl:0 20px 60px rgba(0,0,0,.18);
  --r:10px;--nav:54px;
  --fh:'Outfit',sans-serif;--fb:'DM Sans',sans-serif;--fm:'JetBrains Mono',monospace;
}
body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;font-size:13.5px;line-height:1.5;-webkit-font-smoothing:antialiased}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav);background:var(--navy);display:flex;align-items:center;padding:0 20px;z-index:100;border-bottom:1px solid rgba(255,255,255,.06)}
.nav-logo{font-family:var(--fh);font-size:19px;font-weight:800;color:#fff;letter-spacing:-.5px;margin-right:36px;display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.logo-mark{width:24px;height:24px;border-radius:6px;background:var(--teal);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-mark svg{width:13px;height:13px}
.nav-items{display:flex;align-items:center;gap:1px;flex:1}
.nav-btn{padding:6px 13px;border-radius:6px;color:rgba(255,255,255,.5);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:var(--fb);border:none;background:none;display:flex;align-items:center;gap:5px}
.nav-btn:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.06)}
.nav-btn.on{color:#fff;background:rgba(255,255,255,.11)}
.nav-r{display:flex;align-items:center;gap:3px;margin-left:auto}
.nav-icon{width:34px;height:34px;border-radius:8px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);transition:all .15s;position:relative;font-size:15px}
.nav-icon:hover{background:rgba(255,255,255,.08);color:#fff}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--navy)}
.nav-div{width:1px;height:20px;background:rgba(255,255,255,.08);margin:0 4px}
.nav-av{width:30px;height:30px;border-radius:8px;background:var(--teal);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:12px;font-weight:700;color:#fff;cursor:pointer;margin-left:2px}
.org-pill{padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);font-size:11.5px;color:rgba(255,255,255,.5);font-weight:500;margin-right:8px}
.msg-badge{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:8px;background:var(--red);font-size:9px;font-family:var(--fm);font-weight:700;color:#fff;line-height:1}

/* MODULE LAYOUT */
.mod{display:flex;margin-top:var(--nav);min-height:calc(100vh - var(--nav))}
.sidebar{width:210px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);padding:14px 0 20px;position:sticky;top:var(--nav);height:calc(100vh - var(--nav));overflow-y:auto}
.sb-section{margin-bottom:4px}
.sb-label{font-size:9.5px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.7px;padding:8px 16px 4px}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--slate);transition:all .12s;border:none;background:none;width:100%;text-align:left;border-left:2px solid transparent}
.sb-item:hover{color:var(--navy);background:var(--slate-l)}
.sb-item.on{color:var(--teal);background:var(--teal-l);border-left-color:var(--teal);font-weight:600}
.sb-ico{font-size:14px;width:18px;text-align:center;flex-shrink:0;line-height:1}
.sb-badge{margin-left:auto;height:17px;min-width:17px;padding:0 4px;border-radius:8px;font-family:var(--fm);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-red{background:var(--red-l);color:var(--red)}
.sb-amber{background:var(--amber-l);color:#92400E}
.sb-teal{background:var(--teal-l);color:var(--teal)}
.sb-slate{background:var(--slate-l);color:var(--slate)}
.sb-div{height:1px;background:var(--border);margin:6px 16px}
.content{flex:1;min-width:0;padding:22px 24px;overflow-y:auto}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-family:var(--fb);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent;white-space:nowrap}
.btn-p{background:var(--teal);color:#fff;border-color:var(--teal)}
.btn-p:hover{background:#0a7d72}
.btn-g{background:#fff;border-color:var(--border);color:#374151}
.btn-g:hover{background:var(--slate-l)}
.btn-a{background:var(--navy);color:#fff}
.btn-sm{padding:5px 11px;font-size:12px}
.btn-danger{background:var(--red-l);color:var(--red);border-color:var(--red-l)}

/* TAGS */
.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10.5px;font-weight:600;letter-spacing:.1px}
.t-red{background:var(--red-l);color:var(--red)}
.t-amber{background:var(--amber-l);color:#92400E}
.t-green{background:var(--green-l);color:#065F46}
.t-teal{background:var(--teal-l);color:var(--teal)}
.t-slate{background:var(--slate-l);color:var(--slate)}
.t-purple{background:var(--purple-l);color:#6D28D9}
.t-navy{background:#e8ecf4;color:var(--navy)}

/* UTILS */
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--green)}.dot-amber{background:var(--amber)}.dot-red{background:var(--red)}.dot-teal{background:var(--teal)}.dot-slate{background:var(--slate);opacity:.4}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes slide-up{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes toast-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
@keyframes slide-in-r{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes typing-b{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-4px)}}
.live{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s ease-in-out infinite;flex-shrink:0}

/* PAGE HEADER */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px}
.ph-title{font-family:var(--fh);font-size:21px;font-weight:700;color:var(--navy);letter-spacing:-.3px}
.ph-sub{font-size:12.5px;color:var(--slate);margin-top:2px}
.ph-actions{display:flex;align-items:center;gap:8px}

/* FILTER BAR */
.fbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:220px;max-width:320px}
.search-wrap input{width:100%;padding:7px 12px 7px 32px;border-radius:8px;border:1px solid var(--border);background:#fff;font-family:var(--fb);font-size:13px;outline:none;color:var(--text);transition:border-color .15s}
.search-wrap input:focus{border-color:var(--teal)}
.search-wrap input::placeholder{color:var(--slate)}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--slate);font-size:13px}
.sel{padding:7px 11px;border-radius:8px;border:1px solid var(--border);background:#fff;font-family:var(--fb);font-size:12.5px;color:var(--text);outline:none;cursor:pointer}
.sel:focus{border-color:var(--teal)}
.stabs{display:flex;align-items:center;gap:2px;background:var(--slate-l);padding:3px;border-radius:8px}
.stab{padding:5px 12px;border-radius:6px;font-size:12px;font-weight:500;color:var(--slate);cursor:pointer;transition:all .15s;border:none;background:none;white-space:nowrap}
.stab.on{background:#fff;color:var(--navy);box-shadow:var(--sh-sm)}

/* TABLE */
.tbl-wrap{background:#fff;border-radius:var(--r);box-shadow:var(--sh-sm);border:1px solid var(--border);overflow:hidden}
.tbl-wrap table{width:100%;border-collapse:collapse}
.tbl-wrap thead th{padding:10px 14px;text-align:left;font-size:10.5px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.6px;background:var(--slate-l);border-bottom:1px solid var(--border);white-space:nowrap}
.tbl-wrap tbody tr{border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.tbl-wrap tbody tr:last-child{border-bottom:none}
.tbl-wrap tbody tr:hover{background:#FAFCFF}
.tbl-wrap td{padding:11px 14px;vertical-align:middle}
.staff-cell{display:flex;align-items:center;gap:10px}
.av{display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-weight:700;color:#fff;flex-shrink:0;border-radius:8px}
.sname{font-size:13px;font-weight:600;color:var(--navy)}
.sid{font-family:var(--fm);font-size:10px;color:var(--slate)}
.pips{display:flex;gap:3px}
.pip{width:9px;height:9px;border-radius:2px}
.bf-val{font-family:var(--fm);font-size:12.5px;font-weight:500}
.flink{color:var(--teal);font-weight:500;cursor:pointer}

/* SECTION CARD */
.card{background:#fff;border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--sh-sm);margin-bottom:14px;overflow:hidden}
.card-hd{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-family:var(--fh);font-size:13px;font-weight:600;color:var(--navy)}
.card-body{padding:14px 16px}

/* KPI ROW */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:14px}
.kpi{background:#fff;border-radius:var(--r);border:1px solid var(--border);padding:14px 16px;box-shadow:var(--sh-sm)}
.kpi-label{font-size:10.5px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.kpi-val{font-family:var(--fh);font-size:22px;font-weight:700;color:var(--navy);line-height:1}
.kpi-sub{font-size:11px;color:var(--slate);margin-top:3px}
.kpi-red .kpi-val{color:var(--red)}.kpi-amber .kpi-val{color:var(--amber)}.kpi-green .kpi-val{color:var(--green)}.kpi-teal .kpi-val{color:var(--teal)}

/* DETAIL ROWS */
.drow{padding:9px 0;border-bottom:1px solid var(--border);display:flex;gap:12px}
.drow:last-child{border-bottom:none}
.dlabel{font-size:11.5px;color:var(--slate);font-weight:500;width:160px;flex-shrink:0}
.dval{font-size:12.5px;color:var(--text)}

/* SHIFT ROW */
.shift-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.shift-row:last-child{border-bottom:none}
.shift-date{width:42px;text-align:center;background:var(--slate-l);border-radius:7px;padding:5px 4px;flex-shrink:0}
.shift-day{font-family:var(--fm);font-size:9px;color:var(--slate);text-transform:uppercase}
.shift-num{font-family:var(--fh);font-size:16px;font-weight:700;color:var(--navy);line-height:1}

/* NOTE ROW */
.note-row{padding:10px 0;border-bottom:1px solid var(--border)}
.note-row:last-child{border-bottom:none}
.note-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.note-author{font-size:12px;font-weight:600;color:var(--navy)}
.note-ts{font-family:var(--fm);font-size:10px;color:var(--slate)}
.note-body{font-size:12.5px;color:var(--text);line-height:1.5}
.note-type{font-size:10px;font-weight:600;color:var(--slate);text-transform:uppercase;letter-spacing:.4px;margin-top:4px}

/* BF BAR */
.bf-bar-wrap{height:10px;background:var(--border);border-radius:5px;overflow:hidden;margin:12px 0 6px}
.bf-bar{height:100%;border-radius:5px}
.bf-thresholds{display:flex;justify-content:space-between;font-family:var(--fm);font-size:9.5px;color:var(--slate)}
.bf-big{font-family:var(--fh);font-size:52px;font-weight:800;line-height:1;text-align:center;padding-top:10px}
.bf-big-label{font-size:12px;color:var(--slate);text-align:center;margin-top:4px}

/* DOC ROW */
.doc-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.doc-row:last-child{border-bottom:none}
.doc-ico{width:30px;height:30px;border-radius:7px;background:var(--slate-l);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}

/* ABS ROW */
.abs-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}
.abs-row:last-child{border-bottom:none}

/* PIPELINE */
.pipeline-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
.pcol{min-width:180px;max-width:200px;flex-shrink:0}
.pcol-title{font-size:10.5px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.5px;padding:0 0 7px;display:flex;align-items:center;gap:5px}
.p-count{background:var(--slate-l);color:var(--slate);padding:1px 6px;border-radius:9px;font-family:var(--fm);font-size:10px}
.pcard{background:#fff;border:1px solid var(--border);border-radius:8px;padding:10px 11px;margin-bottom:7px;cursor:pointer;transition:all .15s;box-shadow:var(--sh-sm)}
.pcard:hover{border-color:var(--teal);box-shadow:var(--sh)}
.pcard-name{font-size:12.5px;font-weight:600;color:var(--navy)}
.pcard-sub{font-size:11px;color:var(--slate);margin-top:1px}
.pcard-days{font-family:var(--fm);font-size:10px;color:var(--slate);margin-top:5px}

/* COMPLIANCE TABLE */
.comp-table{width:100%}
.comp-table th{font-size:10.5px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.5px;padding:0 0 8px;text-align:left}
.comp-table td{padding:9px 0;border-top:1px solid var(--border);vertical-align:middle}

/* PROFILE MODAL */
.prof-overlay{position:fixed;inset:0;background:rgba(8,18,34,.6);z-index:300;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(3px);animation:fade-in .2s ease;padding:20px}
.prof-modal{width:100%;max-width:1020px;height:88vh;background:#fff;border-radius:14px;box-shadow:var(--sh-xl);display:flex;flex-direction:column;overflow:hidden;animation:slide-up .25s cubic-bezier(.22,1,.36,1)}
.prof-hd{padding:20px 24px 0;background:var(--navy);flex-shrink:0}
.prof-hd-top{display:flex;align-items:flex-start;gap:14px;margin-bottom:16px}
.prof-big-av{width:52px;height:52px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:20px;font-weight:700;color:#fff;flex-shrink:0;border:2px solid rgba(255,255,255,.15)}
.prof-name{font-family:var(--fh);font-size:20px;font-weight:700;color:#fff;letter-spacing:-.3px;line-height:1.2}
.prof-role-line{display:flex;align-items:center;gap:8px;margin-top:4px}
.prof-role{font-size:13px;color:rgba(255,255,255,.6)}
.status-pill{padding:2px 8px;border-radius:4px;font-size:10.5px;font-weight:700;letter-spacing:.3px}
.sp-active{background:rgba(16,185,129,.2);color:#6EE7B7}
.sp-onboard{background:rgba(245,158,11,.2);color:#FCD34D}
.prof-hd-r{display:flex;align-items:flex-start;gap:7px}
.prof-meta{display:flex;align-items:center;gap:18px;margin-bottom:14px}
.prof-meta-item{display:flex;align-items:center;gap:5px;font-size:12px;color:rgba(255,255,255,.5)}
.prof-meta-item strong{color:rgba(255,255,255,.85);font-weight:500}
.ph-close{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.08);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);font-size:17px;transition:all .15s}
.ph-close:hover{background:rgba(255,255,255,.14);color:#fff}
.msg-btn{padding:6px 12px;border-radius:7px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);font-family:var(--fb);font-size:12px;cursor:pointer;transition:all .15s}
.msg-btn:hover{background:rgba(255,255,255,.14);color:#fff}
.prof-tabs{display:flex;gap:0}
.ptab{padding:9px 16px;font-size:12.5px;font-weight:500;color:rgba(255,255,255,.45);cursor:pointer;transition:all .15s;border:none;background:none;border-bottom:2px solid transparent;white-space:nowrap}
.ptab:hover{color:rgba(255,255,255,.75)}
.ptab.on{color:#fff;border-bottom-color:var(--teal)}
.prof-body{flex:1;overflow-y:auto;background:var(--bg)}
.prof-content{padding:20px 24px}

/* DASHBOARD */
.dash-greeting{font-family:var(--fh);font-size:21px;font-weight:700;color:var(--navy);letter-spacing:-.3px}
.dash-meta{display:flex;align-items:center;gap:10px;margin-top:3px}
.dash-date{font-size:12.5px;color:var(--slate)}
.reg-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;background:var(--teal-l);border:1px solid var(--teal-m);font-size:11px;color:var(--teal);font-weight:600;letter-spacing:.3px}
.wgrid{display:grid;grid-template-columns:repeat(12,1fr);gap:14px;align-items:start}
.wc4{grid-column:span 4}.wc5{grid-column:span 5}.wc6{grid-column:span 6}.wc7{grid-column:span 7}.wc8{grid-column:span 8}
.widget{background:#fff;border-radius:var(--r);box-shadow:var(--sh-sm);border:1px solid var(--border);display:flex;flex-direction:column;transition:box-shadow .2s;overflow:hidden}
.widget:hover{box-shadow:var(--sh)}
.widget.em{border:1.5px dashed var(--teal);box-shadow:none}
.widget-hd{display:flex;align-items:center;padding:11px 13px 9px;gap:7px;border-bottom:1px solid var(--border)}
.widget-ico{font-size:15px;flex-shrink:0;line-height:1}
.widget-tg{flex:1;min-width:0}
.widget-title{font-family:var(--fh);font-size:12.5px;font-weight:600;color:var(--navy)}
.widget-src{font-size:9.5px;color:var(--teal);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.wbadge{height:19px;min-width:19px;padding:0 5px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-family:var(--fm);font-size:10.5px;font-weight:500;flex-shrink:0}
.wb-red{background:var(--red-l);color:var(--red)}.wb-amber{background:var(--amber-l);color:#92400E}.wb-green{background:var(--green-l);color:#065F46}.wb-teal{background:var(--teal-l);color:var(--teal)}.wb-slate{background:var(--slate-l);color:var(--slate)}
.wts{font-family:var(--fm);font-size:9px;color:var(--slate);opacity:.5;flex-shrink:0}
.wx{width:20px;height:20px;border-radius:4px;background:var(--red-l);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--red);font-size:13px;font-weight:700;opacity:0;transition:opacity .15s;flex-shrink:0}
.widget.em .wx{opacity:1}
.widget-body{flex:1;overflow:hidden}
.widget-ft{padding:7px 13px;border-top:1px solid var(--border);font-size:11px;color:var(--slate);display:flex;align-items:center;justify-content:space-between}
.wrow{display:flex;align-items:center;padding:8px 13px;border-bottom:1px solid var(--border);gap:9px;transition:background .1s;cursor:pointer}
.wrow:last-child{border-bottom:none}
.wrow:hover{background:var(--slate-l)}

    body:`Third absence episode this quarter — Bradford Factor now at 118. First formal trigger threshold is 100. Recommend informal conversation before next shift to understand any underlying factors.`,

    body:`Monthly supervision completed with ${n.split(' ')[0]}. Discussed workload balance and client relationships. No concerns raised. Performance remains strong.`,
    flagged:false, assignee:null, assigneeType:null, priority:null, read:true },

    body:'Return to work interview conducted following absence 8–10 Jan. Reason: respiratory illness. Fit note provided. Cleared to return.',
    flagged:false, assignee:null, assigneeType:null, priority:null, read:true },
];

const NOTE_PRI_STAFF = {
  urgent:{ bg:'var(--red-l)',   dot:'var(--red)',   label:'Urgent', tc:'var(--red)'   },
  high:  { bg:'var(--amber-l)', dot:'var(--amber)', label:'Action', tc:'#92400E'      },
  info:  { bg:'var(--teal-l)',  dot:'var(--teal)',  label:'FYI',    tc:'var(--teal)'  },
};

const TabNotes = ({s}) => {
  const [notes, setNotes] = React.useState(genNotes(s.name));
  const [showForm, setShowForm] = React.useState(false);
  const [form, setForm] = React.useState({ type:'General', body:'', flagged:false, assignee:'', priority:'info' });
  const [filter, setFilter] = React.useState('all');
  const unread = notes.filter(n=>n.flagged&&!n.read).length;

  const visible = filter==='all' ? notes : filter==='flagged' ? notes.filter(n=>n.flagged) : notes.filter(n=>!n.flagged);

  const handleAdd = () => {
    if(!form.body.trim()) return;
    const sel = ASSIGNEES.find(a=>a.id===form.assignee);
    const newNote = {
      id:`sn${Date.now()}`, author:'Cameron D', type:form.type, date:'Just now',
      body:form.body, flagged:form.flagged,
      assignee: sel ? sel.label : '',
      assigneeType: sel ? sel.type : '',
      assigneeRole: sel ? sel.role : '',
      priority: form.flagged ? form.priority : null, read:true
    };
    setNotes(prev=>[newNote,...prev]);
    setForm({ type:'General', body:'', flagged:false, assignee:'', priority:'info' });
    setShowForm(false);
  };

  return (
    <div className="prof-content">
      {/* Header row */}
      <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:14,flexWrap:'wrap'}}>
        <div style={{display:'flex',gap:6,flex:1}}>
          {['all','flagged','standard'].map(f=>(
            <button key={f} onClick={()=>setFilter(f)}
              style={{padding:'6px 12px',borderRadius:8,border:`1.5px solid ${filter===f?'var(--teal)':'var(--border)'}`,
                background:filter===f?'var(--teal)':'#fff',color:filter===f?'#fff':'var(--slate)',
                fontFamily:'var(--fb)',fontSize:'12.5px',fontWeight:600,cursor:'pointer',transition:'all .15s',
                display:'flex',alignItems:'center',gap:5}}>
              {f==='flagged'?'🚩':f==='all'?'📋':'📝'} {f==='all'?'All notes':f==='flagged'?`Flagged (${notes.filter(n=>n.flagged).length})`:'Standard'}
              {f==='flagged'&&unread>0&&<span style={{background:'var(--red)',color:'#fff',fontSize:'10px',fontWeight:700,padding:'1px 5px',borderRadius:8,fontFamily:'var(--fm)'}}>{unread}</span>}
            </button>
          ))}
        </div>
        <button className="btn btn-p btn-sm" onClick={()=>setShowForm(s=>!s)}>+ Add note</button>
      </div>

      {/* Add note form */}
      {showForm && (
        <div className="card" style={{marginBottom:14,border:'1.5px solid var(--teal)',background:'var(--teal-l)'}}>
          <div className="card-hd" style={{background:'var(--teal-l)'}}>
            <span className="card-title" style={{color:'var(--teal)'}}>New note</span>
          </div>
          <div style={{padding:'14px 16px',display:'flex',flexDirection:'column',gap:10}}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
              <div>
                <div style={{fontSize:'11px',fontWeight:700,color:'var(--navy)',textTransform:'uppercase',letterSpacing:'.4px',marginBottom:4}}>Note type</div>
                <select className="sel" style={{width:'100%'}} value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
                  {STAFF_NOTE_TYPES.map(t=><option key={t}>{t}</option>)}
                </select>
              </div>
              <div style={{display:'flex',flexDirection:'column',justifyContent:'flex-end'}}>
                <label style={{display:'flex',alignItems:'center',gap:8,cursor:'pointer',padding:'8px 12px',
                  borderRadius:9,border:`1.5px solid ${form.flagged?'var(--red)':'var(--border)'}`,
                  background:form.flagged?'var(--red-l)':'#fff',transition:'all .15s'}}>
                  <input type="checkbox" checked={form.flagged} onChange={e=>setForm(f=>({...f,flagged:e.target.checked}))}
                    style={{accentColor:'var(--red)',width:15,height:15}}/>
                  <span style={{fontSize:'13px',fontWeight:600,color:form.flagged?'var(--red)':'var(--slate)'}}>🚩 Flag for action</span>
                </label>
              </div>
            </div>

            {form.flagged && (
              <div style={{display:'flex',flexDirection:'column',gap:10,padding:'10px 12px',
                background:'var(--red-l)',borderRadius:9,border:'1px solid rgba(220,38,38,.2)'}}>
                <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
                  <div>
                    <div style={{fontSize:'11px',fontWeight:700,color:'var(--red)',textTransform:'uppercase',letterSpacing:'.4px',marginBottom:4}}>Assign to</div>
                    <select className="sel" style={{width:'100%',borderColor:'var(--red)'}} value={form.assignee}
                      onChange={e=>setForm(f=>({...f,assignee:e.target.value}))}>
                      <option value="">Select person or group...</option>
                      <optgroup label="── Coordinators">
                        {ASSIGNEES.filter(a=>a.type==='person').map(a=>(
                          <option key={a.id} value={a.id}>{a.icon} {a.label} — {a.role}</option>
                        ))}
                      </optgroup>
                      <optgroup label="── Groups (notifies all members)">
                        {ASSIGNEES.filter(a=>a.type==='group').map(a=>(
                          <option key={a.id} value={a.id}>{a.icon} {a.label} — {a.role}</option>
                        ))}
                      </optgroup>
                    </select>
                    {form.assignee && (()=>{
                      const sel = ASSIGNEES.find(a=>a.id===form.assignee);
                      if(!sel) return null;
                      return (
                        <div style={{marginTop:6,padding:'5px 9px',borderRadius:7,
                          background:sel.type==='group'?'var(--purple-l)':'var(--teal-l)',
                          border:`1px solid ${sel.type==='group'?'var(--purple)':'var(--teal)'}30`,
                          fontSize:'11.5px',color:sel.type==='group'?'var(--purple)':'var(--teal)',fontWeight:500,
                          display:'flex',alignItems:'center',gap:5}}>
                          {sel.icon}
                          {sel.type==='group'
                            ? <span>All <strong>{sel.role.split('·')[1]?.trim()}</strong> will be notified</span>
                            : <span>Notification sent to <strong>{sel.label}</strong></span>}
                        </div>
                      );
                    })()}
                  </div>
                  <div>
                    <div style={{fontSize:'11px',fontWeight:700,color:'var(--red)',textTransform:'uppercase',letterSpacing:'.4px',marginBottom:4}}>Priority</div>
                    <div style={{display:'flex',gap:6}}>
                      {['urgent','high','info'].map(p=>(
                        <button key={p} onClick={()=>setForm(f=>({...f,priority:p}))}
                          style={{flex:1,padding:'6px 4px',borderRadius:7,border:`1.5px solid ${form.priority===p?NOTE_PRI_STAFF[p].dot:'var(--border)'}`,
                            background:form.priority===p?NOTE_PRI_STAFF[p].bg:'#fff',
                            color:form.priority===p?NOTE_PRI_STAFF[p].tc:'var(--slate)',
                            fontSize:'11px',fontWeight:600,cursor:'pointer',textTransform:'capitalize',transition:'all .15s'}}>
                          {p}
                        </button>
                      ))}
                    </div>
                  </div>
                </div>
              </div>
            )}

            <div>
              <div style={{fontSize:'11px',fontWeight:700,color:'var(--navy)',textTransform:'uppercase',letterSpacing:'.4px',marginBottom:4}}>Note</div>
              <textarea style={{width:'100%',minHeight:80,padding:'10px 12px',borderRadius:9,
                border:'1.5px solid var(--border)',fontFamily:'var(--fb)',fontSize:'13.5px',
                color:'var(--text)',resize:'vertical',outline:'none',transition:'border-color .15s'}}
                placeholder="Enter note..."
                value={form.body} onChange={e=>setForm(f=>({...f,body:e.target.value}))}
                onFocus={e=>e.target.style.borderColor='var(--teal)'}
                onBlur={e=>e.target.style.borderColor='var(--border)'}/>
            </div>
            <div style={{display:'flex',gap:8,justifyContent:'flex-end'}}>
              <button className="btn btn-g btn-sm" onClick={()=>setShowForm(false)}>Cancel</button>
              <button className="btn btn-p btn-sm" onClick={handleAdd}>Save note</button>
            </div>
          </div>
        </div>
      )}

      {/* Notes list */}
      <div className="card">
        <div className="card-hd">
          <span className="card-title">Notes ({visible.length})</span>
          <select className="sel" style={{fontSize:'11.5px',padding:'4px 8px'}}>
            <option>All types</option>
            {STAFF_NOTE_TYPES.map(t=><option key={t}>{t}</option>)}
          </select>
        </div>
        <div className="card-body" style={{padding:'0 16px'}}>
          {visible.length===0 && <div style={{padding:'24px',textAlign:'center',color:'var(--slate)',fontSize:'13.5px'}}>No notes to show</div>}
          {visible.map(n=>{
            const ps = n.flagged && n.priority ? NOTE_PRI_STAFF[n.priority] : null;
            return (
              <div key={n.id} style={{borderBottom:'1px solid var(--border)',
                background:n.flagged&&!n.read?ps?.bg:'transparent',
                margin:'0 -16px',padding:'14px 16px',
                cursor:n.flagged&&!n.read?'pointer':'default',transition:'background .15s'}}
                onClick={()=>n.flagged&&!n.read&&setNotes(prev=>prev.map(x=>x.id===n.id?{...x,read:true}:x))}>
                <div style={{display:'flex',alignItems:'flex-start',gap:8,marginBottom:6}}>
                  {n.flagged&&<span style={{fontSize:14,flexShrink:0,marginTop:1}}>🚩</span>}
                  <div style={{flex:1}}>
                    <div style={{display:'flex',alignItems:'center',gap:6,flexWrap:'wrap'}}>
                      <span style={{fontFamily:'var(--fh)',fontSize:'13px',fontWeight:700,color:'var(--navy)'}}>{n.author}</span>
                      <span style={{fontSize:'11px',color:'var(--slate)',background:'var(--slate-l)',padding:'1px 6px',borderRadius:4}}>{n.type}</span>
                      {n.flagged&&ps&&<span style={{fontSize:'10.5px',fontWeight:700,color:ps.tc,background:ps.bg,padding:'1px 6px',borderRadius:4,border:`1px solid ${ps.dot}30`}}>{ps.label}</span>}
                      {!n.read&&n.flagged&&<span style={{fontSize:'10px',fontWeight:700,color:ps?.tc,marginLeft:'auto'}}>● Unread</span>}
                    </div>
                    <div style={{fontSize:'11px',color:'var(--slate)',marginTop:2,fontFamily:'var(--fm)'}}>{n.date}</div>
                  </div>
                </div>
                <div style={{fontSize:'13.5px',color:'var(--text)',lineHeight:1.55,marginBottom:n.flagged&&n.assignee?6:0}}>{n.body}</div>
                {n.flagged&&n.assignee&&(
                  <div style={{display:'flex',alignItems:'center',gap:6,marginTop:6,padding:'6px 10px',
                    background:n.assigneeType==='group'?'var(--purple-l)':'var(--slate-l)',
                    borderRadius:7,fontSize:'12px',
                    border:`1px solid ${n.assigneeType==='group'?'var(--purple)':'var(--border)'}20`}}>
                    <span>{n.assigneeType==='group'?'👥':'👤'}</span>
                    <span style={{color:'var(--slate)'}}>{n.assigneeType==='group'?'Group:':'Assigned to:'}</span>
                    <span style={{fontWeight:700,color:n.assigneeType==='group'?'var(--purple)':'var(--navy)'}}>{n.assignee}</span>
                    {n.assigneeType==='group'&&n.assigneeRole&&<span style={{fontSize:'11px',color:'var(--slate)'}}>· {n.assigneeRole.split('·')[1]?.trim()}</span>}
                    {n.read&&<span style={{marginLeft:'auto',fontSize:'10.5px',color:'var(--green)',fontWeight:600}}>✓ Acknowledged</span>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
};

const DashboardScreen = () => {
  const stored = lsLoad();
  const [ids,      setIds]      = useState(stored.ids || DEFAULT_WIDGETS);
  const [editMode, setEditMode] = useState(false);
  const [showLib,  setShowLib]  = useState(false);
  const [toast,    setToast]    = useState(null);
  const timer = useRef(null);

  useEffect(() => { lsSave({ids}); }, [ids]);

  const flash = msg => {
    setToast(msg);
    clearTimeout(timer.current);
    timer.current = setTimeout(() => setToast(null), 2200);
  };
  const toggleWidget = id => {
    const on = ids.includes(id);
    setIds(prev => on ? prev.filter(x=>x!==id) : [...prev, id]);
    flash(on ? 'Widget removed' : `${REGISTRY.find(w=>w.id===id)?.name} added`);
  };
  const removeWidget = id => {
    setIds(prev => prev.filter(x => x!==id));
    flash('Widget removed');
  };
  const widgets = ids.map(id => REGISTRY.find(w => w.id===id)).filter(Boolean);

  return (
    <div className="mod">
      <Sidebar items={DASH_SB} active="dashboard" setActive={() => {}} />
      <div className="content">
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:18}}>
          <div>
            <div className="dash-greeting">{GREET}, {USER.name}</div>
            <div className="dash-meta">
              <span className="dash-date">{DATE_STR}</span>
              <span className="reg-pill">{ORG.reg}</span>
            </div>
          </div>
          <div style={{display:'flex',gap:8}}>
            <button className="btn btn-g" onClick={() => { setEditMode(true); setShowLib(true); }}>+ Add widget</button>
            <button className={`btn ${editMode?'btn-a':'btn-g'}`} onClick={() => setEditMode(e => !e)}>
              {editMode ? 'Done editing' : 'Edit layout'}
            </button>
          </div>
        </div>
        {editMode && <div className="edit-banner">Edit mode — click × on any widget to remove it</div>}
        {widgets.length > 0 ? (
          <div className="wgrid">
            {widgets.map(cfg => {
              const Comp = WIDGET_MAP[cfg.id];
              return Comp ? <Comp key={cfg.id} cfg={cfg} editMode={editMode} onRemove={removeWidget} /> : null;
            })}
          </div>
        ) : (
          <div className="empty-dash">
            <div className="big">📊</div>
            <h2>Your dashboard is empty</h2>
            <p>Add widgets to build your personal operational view</p>
            <button className="btn btn-p" onClick={() => { setEditMode(true); setShowLib(true); }}>+ Add your first widget</button>
          </div>
        )}
      </div>
      {showLib && <Library activeIds={ids} onClose={() => setShowLib(false)} onToggle={toggleWidget} />}
      <Toast msg={toast} />
    </div>
  );
};

// ── MESSAGES SCREEN ──────────────────────────────────────────────────────────
const MessagesScreen = () => {
  const [activeThread, setActiveThread]   = useState('t1');
  const [typeFilter,   setTypeFilter]     = useState('All');
  const [compose,      setCompose]        = useState('');
  const [messages,     setMessages]       = useState(MSG_DATA);
  const [threads,      setThreads]        = useState(MSG_THREADS);
  const [typing,       setTyping]         = useState(false);
  const bottomRef = useRef(null);
  const typingTimer = useRef(null);

  const thread = threads.find(t => t.id===activeThread);
  const msgs   = messages[activeThread] || [];

  useEffect(() => { bottomRef.current?.scrollIntoView({behavior:'smooth'}); }, [activeThread, msgs.length]);

  const handleSelect = id => {
    setActiveThread(id);
    setThreads(prev => prev.map(t => t.id===id ? {...t, unread:0} : t));
  };

  const handleSend = () => {
    if(!compose.trim()) return;
    const msg = {id:Date.now(), sender:'CD', name:'Cameron D', mine:true, time:'Now', body:compose.trim(), type:'user', receipt:'delivered'};
    setMessages(prev => ({...prev, [activeThread]:[...(prev[activeThread]||[]), msg]}));
    setThreads(prev => prev.map(t => t.id===activeThread ? {...t, time:'Now', preview:`You: ${compose.trim().slice(0,40)}`} : t));
    setCompose('');
    if(activeThread==='t1') {
      setTimeout(() => setTyping(true), 1200);
      setTimeout(() => {
        setTyping(false);
        const reply = {id:Date.now()+1, sender:'EW', name:'Emma Williams', mine:false, time:'Now', body:'Perfect, I will head straight over after the 10am call. Should be there by 14:10.', type:'user'};
        setMessages(prev => ({...prev, t1:[...(prev.t1||[]), reply]}));
      }, 3500);
    }
  };

  const filtered = threads.filter(t =>
    typeFilter==='All' ||
    (typeFilter==='Direct'&&t.type==='direct') ||
    (typeFilter==='Groups'&&t.type==='group') ||
    (typeFilter==='Broadcasts'&&t.type==='broadcast')
  );

  return (
    <div className="msg-layout">
      <div className="tlist">
        <div className="tlist-hd">
          <div className="tlist-title">
            Messages {threads.reduce((s,t)=>s+t.unread,0)>0 && <span style={{fontFamily:'var(--fm)',fontSize:12,color:'var(--red)',fontWeight:700}}>{threads.reduce((s,t)=>s+t.unread,0)}</span>}
          </div>
          <div className="tsearch-wrap">
            <span className="tsearch-ico">🔍</span>
            <input className="tsearch" placeholder="Search messages..." />
          </div>
          <div className="ttype-tabs">
            {['All','Direct','Groups','Broadcasts'].map(t => (
              <button key={t} className={`ttab${typeFilter===t?' on':''}`} onClick={() => setTypeFilter(t)}>{t}</button>
            ))}
          </div>
        </div>
        <div className="new-msg">
          <button className="btn btn-p btn-sm" style={{width:'100%'}}>+ New message</button>
        </div>
        <div className="titems">
          {filtered.map(t => (
            <div key={t.id} className={`titem${activeThread===t.id?' on':''}`} onClick={() => handleSelect(t.id)}>
              <div className="tav" style={{background:t.type==='broadcast'?'var(--purple)':t.type==='group'?'var(--navy)':t.color}}>
                {t.type==='broadcast' ? '📢' : t.initials}
                {t.online && t.type==='direct' && <div className="tav-online" />}
              </div>
              <div className="titem-body">
                <div className="titem-name">{t.name}{t.muted&&<span style={{marginLeft:4,fontSize:9,color:'var(--slate)'}}>🔇</span>}</div>
                <div className={`titem-prev${t.unread>0?' unread':''}`}>{t.preview}</div>
              </div>
              <div className="titem-r">
                <div className="titem-time">{t.time}</div>
                {t.unread>0 && <div className="tunread">{t.unread}</div>}
              </div>
            </div>
          ))}
        </div>
      </div>
      <div className="tview">
        {thread ? (
          <>
            <div className="thd">
              <div className="thd-av" style={{background:thread.type==='broadcast'?'var(--purple)':thread.type==='group'?'var(--navy)':thread.color}}>
                {thread.type==='broadcast' ? '📢' : thread.initials}
              </div>
              <div style={{flex:1}}>
                <div className="thd-name">{thread.name}</div>
                <div className="thd-meta">
                  {thread.type==='direct' && <><span className={`dot dot-${thread.online?'green':'slate'}`} style={{display:'inline-block',marginRight:4}} />{thread.online?'Online':thread.role}</>}
                  {thread.type==='group' && `${thread.members} members`}
                  {thread.type==='broadcast' && 'Broadcast - recipients cannot reply'}
                </div>
              </div>
              <div style={{display:'flex',gap:5}}>
                {thread.type==='direct' && <button className="thd-btn">📞</button>}
                <button className="thd-btn">🔍</button>
                <button className="thd-btn">ℹ</button>
              </div>
            </div>
            {thread.type==='broadcast' && (
              <div className="bcast-notice">📢 Broadcast message - recipients cannot reply</div>
            )}
            <div className="msgs-area">
              <div className="msg-date-div"><span>Today</span></div>
              {msgs.map((m, i) => {
                if(m.type==='system') return (
                  <div key={m.id} className="mrow sys">
                    <div className="mbubble sys-b">
                      <div style={{fontSize:10,fontWeight:700,color:'var(--teal)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.4px'}}>CareFlow System</div>
                      {m.body.split('\n').map((line,j) => <div key={j}>{line}</div>)}
                      <div style={{fontFamily:'var(--fm)',fontSize:9,color:'var(--slate)',marginTop:5}}>{m.time}</div>
                    </div>
                  </div>
                );
                const showAv = !m.mine && (i===0 || msgs[i-1]?.sender!==m.sender || msgs[i-1]?.type==='system');
                return (
                  <div key={m.id} className={`mrow${m.mine?' mine':''}`}>
                    {!m.mine && (
                      <div className="msav" style={{background:avCol(m.name),visibility:showAv?'visible':'hidden'}}>
                        {inits(m.name)}
                      </div>
                    )}
                    <div>
                      {showAv && !m.mine && <div className="msender">{m.name}</div>}
                      <div className={`mbubble ${m.mine?'mine':'theirs'}`}>{m.body}</div>
                      <div className={`mmeta${m.mine?' mine':''}`}>
                        <span className={`mtime${m.mine?' mine':''}`}>{m.time}</span>
                        {m.mine && m.receipt && <span style={{fontSize:9}}>{m.receipt==='seen'?'✓✓':'✓'}</span>}
                      </div>
                    </div>
                  </div>
                );
              })}
              {typing && (
                <div className="mrow">
                  <div className="msav" style={{background:avCol('Emma Williams')}}>{inits('Emma Williams')}</div>
                  <div>
                    <div className="msender">Emma Williams</div>
                    <div className="mbubble theirs" style={{padding:'10px 14px'}}>
                      <div className="typing-dots"><span /><span /><span /></div>
                    </div>
                  </div>
                </div>
              )}
              <div ref={bottomRef} />
            </div>
            {thread.type !== 'broadcast' ? (
              <div className="compose-area">
                <div className="compose-inner">
                  <textarea className="compose-inp" rows={1}
                    placeholder={`Message ${thread.name}...`}
                    value={compose}
                    onChange={e => setCompose(e.target.value)}
                    onKeyDown={e => { if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();handleSend();} }}
                  />
                  <div style={{display:'flex',alignItems:'center',gap:4,flexShrink:0}}>
                    <button className="cbtn">📎</button>
                    <button className="cbtn">🕐</button>
                    <button className="csend" onClick={handleSend} disabled={!compose.trim()}>&#10148;</button>
                  </div>
                </div>
                <div className="compose-meta">
                  <span>Enter to send · Shift+Enter for new line</span>
                  <span style={{fontFamily:'var(--fm)',fontSize:10}}>{compose.length}/10000</span>
                </div>
              </div>
            ) : (
              <div className="compose-area" style={{background:'var(--slate-l)',textAlign:'center',color:'var(--slate)',fontSize:'12.5px',padding:14}}>
                Broadcast - recipients cannot reply
              </div>
            )}
          </>
        ) : (
          <div className="no-thread">
            <div className="ico">💬</div>
            <h3>Select a conversation</h3>
            <p>Choose a thread from the left or start a new message</p>
          </div>
        )}
      </div>
    </div>
  );
};

    {label:'Clinical',items:[{id:'incidents',ico:'🚨',label:'Incidents',badge:2,badgeColor:'red'},{id:'complaints',ico:'📣',label:'Complaints',badge:1,badgeColor:'amber'},{id:'medications',ico:'💊',label:'Medications'},{id:'body-maps',ico:'🫀',label:'Body Maps'}]},
  ],
  rostering: [
    {items:[{id:'day',ico:'📅',label:'Day View'},{id:'week',ico:'📆',label:'Week View'},{id:'templates',ico:'🔄',label:'SmartRota Templates'},{id:'rounds',ico:'🔁',label:'Rounds Builder'},{id:'unassigned',ico:'⚠️',label:'Unassigned Visits',badge:3,badgeColor:'red'},{id:'rules',ico:'⚙️',label:'Roster Rules'}]},
  ],
  finance: [
    {items:[{id:'fin',ico:'💰',label:'Finance Dashboard'},{id:'invoices',ico:'📄',label:'Invoices',badge:3,badgeColor:'amber'},{id:'credit',ico:'📋',label:'Credit Notes',badge:1,badgeColor:'red'},{id:'funders',ico:'🏛️',label:'Funders'}]},
    {label:'Payroll',items:[{id:'payroll',ico:'💳',label:'Payroll'},{id:'rates',ico:'⚙️',label:'Pay Rates'}]},
  ],
  reports: [
    {items:[{id:'all-r',ico:'📊',label:'All Reports'}]},
    {label:'Staff',items:[{id:'comp-r',ico:'🛡️',label:'Compliance'},{id:'bf-r',ico:'📈',label:'Bradford Factor'},{id:'abs-r',ico:'🤒',label:'Absence'},{id:'train-r',ico:'🎓',label:'Training Matrix'}]},
    {label:'Clients',items:[{id:'inc-r',ico:'🚨',label:'Incidents'},{id:'comp2-r',ico:'📣',label:'Complaints'},{id:'mar-r',ico:'💊',label:'Medication'}]},
    {label:'Custom',items:[{id:'builder',ico:'🔧',label:'Report Builder'},{id:'saved',ico:'💾',label:'My Saved Reports'},{id:'sched',ico:'📅',label:'Scheduled'}]},
    {divider:true,items:[{id:'insp',ico:'⚡',label:'Inspection Packs'}]},
  ],
};

const ComingSoon = ({name, sbKey}) => {
  const sbItems = CS_SIDEBARS[sbKey] || [];
  const [sub, setSub] = useState(null);
  return (
    <div className="mod">
      {sbItems.length>0 && <Sidebar items={sbItems} active={sub} setActive={setSub} />}
      <div className="content">
        <div className="cs-wrap">
          <div className="big">🚧</div>
          <h2>{name}</h2>
          <p>This screen is next in the build queue.</p>
        </div>
      </div>
    </div>
  );
};

// ── NAV ───────────────────────────────────────────────────────────────────────
const ROSTERING_FILE = 'CareFlow_Rostering.html';
const CLIENTS_FILE   = 'CareFlow_Clients.html';
const FINANCE_FILE   = 'CareFlow_Finance.html';
const LOGIN_FILE     = 'CareFlow_Login.html';

const Nav = ({screen, setScreen}) => (
  <nav className="nav">
    <div className="nav-logo" onClick={() => setScreen('home')} style={{cursor:'pointer'}}>
      <span className="logo-mark">
        <svg viewBox="0 0 13 13" fill="none">
          <rect x="1" y="1" width="5" height="5" rx="1.5" fill="white" opacity=".9"/>
          <rect x="7" y="1" width="5" height="5" rx="1.5" fill="white" opacity=".6"/>
          <rect x="1" y="7" width="5" height="5" rx="1.5" fill="white" opacity=".6"/>
          <rect x="7" y="7" width="5" height="5" rx="1.5" fill="white" opacity=".3"/>
        </svg>
      </span>
      CareFlow
    </div>
    <div className="nav-items">
      {[['home','Home'],['staff','Staff']].map(([id,label]) => (
        <button key={id} className={`nav-btn${screen===id?' on':''}`} onClick={() => setScreen(id)}>{label}</button>
      ))}
      <button className="nav-btn" onClick={() => window.location.href = CLIENTS_FILE}>Clients</button>
      <button
        className={`nav-btn${screen==='rostering'?' on':''}`}
        onClick={() => window.location.href = ROSTERING_FILE}
      >Rostering</button>
      {[['finance','Finance'],['reports','Reports']].map(([id,label]) => (
        <button key={id} className={`nav-btn${screen===id?' on':''}`}
          onClick={() => id==='finance' ? window.location.href=FINANCE_FILE : setScreen(id)}>{label}</button>
      ))}
      <button className={`nav-btn${screen==='messages'?' on':''}`} onClick={() => setScreen('messages')}>
        Messages <span className="msg-badge">3</span>
      </button>
    </div>
    <div className="nav-r">
      <span className="org-pill">{ORG.short}</span>
      <button className="nav-icon">🔔<span className="notif-dot" /></button>
      <button className="nav-icon">⚙️</button>
      <div className="nav-div" />
      <div className="nav-av" onClick={() => window.location.href=LOGIN_FILE} title="Sign out">{USER.initials}</div>
    </div>
  </nav>
);

// ── APP ───────────────────────────────────────────────────────────────────────
const App = () => {
  const initialScreen = () => {
    try {
      const p = new URLSearchParams(window.location.search).get('screen');
      return p || 'home';
    } catch { return 'home'; }
  };
  const [screen, setScreen] = useState(initialScreen);
  return (
    <>
      <Nav screen={screen} setScreen={setScreen} />
      {screen==='home'      && <DashboardScreen />}
      {screen==='staff'     && <StaffScreen />}
      {screen==='clients'   && <ComingSoon name="Clients"    sbKey="clients" />}
      {screen==='rostering' && <ComingSoon name="Rostering"  sbKey="rostering" />}
      {screen==='finance'   && <ComingSoon name="Finance"    sbKey="finance" />}
      {screen==='reports'   && <ComingSoon name="Reports"    sbKey="reports" />}
      {screen==='messages'  && <MessagesScreen />}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
