<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareFlow — Rostering</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0D1F3C;--teal:#0D9488;--teal-l:#F0FDFA;--teal-m:#CCFBF1;
  --slate:#64748B;--slate-l:#F1F5F9;--border:#E2E8F0;
  --red:#DC2626;--red-l:#FEF2F2;
  --amber:#F59E0B;--amber-l:#FFFBEB;
  --green:#10B981;--green-l:#F0FDF4;
  --purple:#8B5CF6;--purple-l:#F5F3FF;
  --blue:#3B82F6;--blue-l:#EFF6FF;
  --bg:#F8FAFC;--text:#1E293B;
  --sh-sm:0 1px 2px rgba(0,0,0,.05),0 1px 3px rgba(0,0,0,.04);
  --sh:0 4px 6px -1px rgba(0,0,0,.07),0 2px 4px -2px rgba(0,0,0,.04);
  --sh-lg:0 10px 25px -5px rgba(0,0,0,.1),0 4px 6px -2px rgba(0,0,0,.04);
  --sh-xl:0 20px 60px rgba(0,0,0,.18);
  --nav:54px;
  --fh:'Outfit',sans-serif;--fb:'DM Sans',sans-serif;--fm:'JetBrains Mono',monospace;
}
body{font-family:var(--fb);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;font-size:13.5px;-webkit-font-smoothing:antialiased}

/* NAV */
.nav{position:fixed;top:0;left:0;right:0;height:var(--nav);background:var(--navy);display:flex;align-items:center;padding:0 20px;z-index:200;border-bottom:1px solid rgba(255,255,255,.06)}
.nav-logo{font-family:var(--fh);font-size:19px;font-weight:800;color:#fff;letter-spacing:-.5px;margin-right:36px;display:flex;align-items:center;gap:7px;cursor:pointer;user-select:none}
.logo-mark{width:24px;height:24px;border-radius:6px;background:var(--teal);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-mark svg{width:13px;height:13px}
.nav-items{display:flex;align-items:center;gap:1px;flex:1}
.nav-btn{padding:6px 13px;border-radius:6px;color:rgba(255,255,255,.5);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:var(--fb);border:none;background:none}
.nav-btn:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.06)}
.nav-btn.on{color:#fff;background:rgba(255,255,255,.11)}
.nav-r{display:flex;align-items:center;gap:3px;margin-left:auto}
.nav-icon{width:34px;height:34px;border-radius:8px;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);font-size:15px;position:relative}
.nav-icon:hover{background:rgba(255,255,255,.08);color:#fff}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:var(--red);border-radius:50%;border:2px solid var(--navy)}
.nav-div{width:1px;height:20px;background:rgba(255,255,255,.08);margin:0 4px}
.nav-av{width:30px;height:30px;border-radius:8px;background:var(--teal);display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:12px;font-weight:700;color:#fff;cursor:pointer;margin-left:2px}
.org-pill{padding:4px 10px;border-radius:20px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.09);font-size:11.5px;color:rgba(255,255,255,.5);font-weight:500;margin-right:8px}

/* LAYOUT */
.app{display:flex;margin-top:var(--nav);height:calc(100vh - var(--nav));overflow:hidden}

/* SIDEBAR */
.sidebar{width:210px;flex-shrink:0;background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.sb-section{margin-bottom:4px}
.sb-label{font-size:9.5px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.7px;padding:10px 16px 4px}
.sb-item{display:flex;align-items:center;gap:8px;padding:7px 16px;cursor:pointer;font-size:12.5px;font-weight:500;color:var(--slate);transition:all .12s;border:none;background:none;width:100%;text-align:left;border-left:2px solid transparent}
.sb-item:hover{color:var(--navy);background:var(--slate-l)}
.sb-item.on{color:var(--teal);background:var(--teal-l);border-left-color:var(--teal);font-weight:600}
.sb-ico{font-size:14px;width:18px;text-align:center;flex-shrink:0;line-height:1}
.sb-badge{margin-left:auto;height:17px;min-width:17px;padding:0 4px;border-radius:8px;font-family:var(--fm);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-red{background:var(--red-l);color:var(--red)}
.sb-amber{background:var(--amber-l);color:#92400E}
.sb-teal{background:var(--teal-l);color:var(--teal)}
.sb-div{height:1px;background:var(--border);margin:6px 16px}

/* MAIN AREA */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* TOOLBAR */
.toolbar{background:#fff;border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.toolbar-left{display:flex;align-items:center;gap:8px;flex:1}
.toolbar-right{display:flex;align-items:center;gap:8px}

.date-nav{display:flex;align-items:center;gap:0;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:#fff}
.date-nav-btn{width:32px;height:32px;border:none;background:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--slate);transition:all .15s}
.date-nav-btn:hover{background:var(--slate-l);color:var(--navy)}
.date-nav-label{padding:0 12px;font-family:var(--fh);font-size:13px;font-weight:600;color:var(--navy);white-space:nowrap;border-left:1px solid var(--border);border-right:1px solid var(--border);display:flex;align-items:center;height:32px}

.view-toggle{display:flex;align-items:center;gap:0;background:var(--slate-l);border-radius:8px;padding:2px}
.vt-btn{padding:5px 13px;border-radius:6px;font-size:12px;font-weight:500;color:var(--slate);border:none;background:none;cursor:pointer;transition:all .15s;white-space:nowrap}
.vt-btn.on{background:#fff;color:var(--navy);box-shadow:var(--sh-sm);font-weight:600}

.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:8px;font-family:var(--fb);font-size:12.5px;font-weight:500;cursor:pointer;transition:all .15s;border:1px solid transparent;white-space:nowrap}
.btn-p{background:var(--teal);color:#fff}
.btn-p:hover{background:#0a7d72}
.btn-g{background:#fff;border-color:var(--border);color:#374151}
.btn-g:hover{background:var(--slate-l)}
.btn-sm{padding:5px 10px;font-size:12px}

.tag{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10.5px;font-weight:600}
.t-green{background:var(--green-l);color:#065F46}
.t-red{background:var(--red-l);color:var(--red)}
.t-amber{background:var(--amber-l);color:#92400E}
.t-teal{background:var(--teal-l);color:var(--teal)}
.t-slate{background:var(--slate-l);color:var(--slate)}
.t-partial{background:#FFF7ED;color:#C2410C}

.filter-sel{padding:5px 10px;border-radius:7px;border:1px solid var(--border);background:#fff;font-family:var(--fb);font-size:12px;color:var(--text);outline:none;cursor:pointer;height:32px}
.filter-sel:focus{border-color:var(--teal)}

.publish-btn{background:var(--navy);color:#fff;border-color:var(--navy)}
.publish-btn:hover{background:#162d54}

/* GANTT */
.gantt-wrap{flex:1;display:flex;overflow:hidden;position:relative}

.gantt-scroll{flex:1;overflow:auto;display:flex;flex-direction:column}

/* Row label column */
.gantt-label-col{width:220px;flex-shrink:0}
.gantt-time-col{flex:1;min-width:0}

/* Header row */
.gantt-header{display:flex;align-items:stretch;flex-shrink:0;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:10}
.gantt-header-label{width:220px;flex-shrink:0;padding:8px 14px;font-size:10.5px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.5px;border-right:1px solid var(--border);display:flex;align-items:center}
.gantt-header-times{flex:1;display:flex;position:relative;overflow:hidden}
.time-cell{flex-shrink:0;padding:8px 0 8px 6px;font-family:var(--fm);font-size:10.5px;color:var(--slate);border-right:1px solid var(--border);position:relative}
.time-cell.major{font-weight:600;color:var(--navy)}

/* Rows */
.gantt-rows{flex:1}
.gantt-row{display:flex;align-items:stretch;border-bottom:1px solid var(--border);min-height:64px}
.gantt-row:hover .gantt-row-bg{background:rgba(13,31,60,.015)}
.gantt-row-label{width:220px;flex-shrink:0;padding:10px 14px;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;gap:3px;background:#fff;cursor:pointer}
.gantt-row-label:hover{background:var(--slate-l)}
.row-label-name{font-family:var(--fh);font-size:12.5px;font-weight:600;color:var(--navy)}
.row-label-sub{font-size:11px;color:var(--slate);display:flex;align-items:center;gap:5px}
.row-caret{font-size:10px;color:var(--slate)}
.carer-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.row-label-unassigned{color:var(--red);font-weight:600}

.gantt-row-track{flex:1;position:relative;background:#fff}
.gantt-row-bg{position:absolute;inset:0;pointer-events:none}
.hour-line{position:absolute;top:0;bottom:0;width:1px;background:var(--border);pointer-events:none}
.hour-line.half{background:transparent;border-left:1px dashed #E9EEF4}
.now-line{position:absolute;top:0;bottom:0;width:2px;background:var(--red);opacity:.5;pointer-events:none;z-index:5}
.now-pip{position:absolute;top:-4px;left:-4px;width:10px;height:10px;background:var(--red);border-radius:50%;opacity:.7}

/* SHIFT BARS */
.shift-bar{position:absolute;top:10px;height:44px;border-radius:7px;cursor:pointer;display:flex;align-items:center;padding:0 8px;gap:5px;transition:box-shadow .15s,filter .15s;user-select:none;overflow:hidden;z-index:3}
.shift-bar:hover{box-shadow:0 3px 10px rgba(0,0,0,.2);filter:brightness(1.05);z-index:6}
.shift-bar.dragging{box-shadow:0 8px 24px rgba(0,0,0,.25);filter:brightness(1.08);z-index:20;cursor:grabbing;opacity:.9}
.shift-bar.unassigned-bar{border:2px dashed currentColor;background:transparent}
.sb-svc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-client{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.sb-time{font-family:var(--fm);font-size:9.5px;opacity:.8;flex-shrink:0;white-space:nowrap}

/* SHIFT DETAIL PANEL */
.detail-panel{width:300px;flex-shrink:0;background:#fff;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;box-shadow:var(--sh-lg)}
.dp-header{padding:14px 16px;border-bottom:1px solid var(--border);background:var(--navy)}
.dp-title{font-family:var(--fh);font-size:14px;font-weight:700;color:#fff;margin-bottom:2px}
.dp-sub{font-size:11.5px;color:rgba(255,255,255,.55)}
.dp-close{position:absolute;top:14px;right:16px;width:28px;height:28px;border-radius:7px;background:rgba(255,255,255,.1);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.7);font-size:15px;transition:all .15s}
.dp-close:hover{background:rgba(255,255,255,.2);color:#fff}
.dp-body{flex:1;overflow-y:auto;padding:14px 16px}
.dp-row{padding:9px 0;border-bottom:1px solid var(--border);display:flex;gap:12px}
.dp-row:last-child{border-bottom:none}
.dp-label{font-size:11.5px;color:var(--slate);font-weight:500;width:100px;flex-shrink:0}
.dp-val{font-size:12.5px;color:var(--text)}
.dp-section{font-size:10px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.6px;padding:10px 0 4px;margin-top:4px}
.dp-actions{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:7px}

/* UNASSIGNED PANEL */
.unassigned-panel{width:280px;flex-shrink:0;background:#fff;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.up-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.up-title{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--navy)}
.up-badge{background:var(--red-l);color:var(--red);font-family:var(--fm);font-size:11px;font-weight:700;padding:2px 7px;border-radius:8px}
.up-body{flex:1;overflow-y:auto}
.up-item{padding:10px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s}
.up-item:hover{background:var(--slate-l)}
.up-item:last-child{border-bottom:none}
.up-client{font-size:12.5px;font-weight:600;color:var(--navy)}
.up-meta{font-size:11px;color:var(--slate);margin-top:2px}
.up-time{font-family:var(--fm);font-size:11px;font-weight:500;color:var(--red);margin-top:3px}
.up-svc{display:inline-flex;align-items:center;gap:4px;font-size:10.5px;margin-top:3px}
.up-footer{padding:10px 14px;border-top:1px solid var(--border)}

/* DRAG GHOST TIME TOOLTIP */
.drag-tooltip{position:fixed;background:var(--navy);color:#fff;font-family:var(--fm);font-size:11px;padding:4px 8px;border-radius:5px;pointer-events:none;z-index:999;box-shadow:var(--sh)}

/* SERVICE LEGEND */
.svc-legend{display:flex;align-items:center;gap:12px;padding:6px 16px;background:var(--slate-l);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.svc-legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--slate)}
.svc-swatch{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* SNAP INDICATOR */
.snap-line{position:absolute;top:0;bottom:0;width:2px;background:var(--teal);opacity:.5;pointer-events:none;z-index:15}

/* TEMPLATES */
.tpl-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden}
.tpl-toolbar{background:#fff;border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.week-tabs{display:flex;gap:2px;background:var(--slate-l);padding:3px;border-radius:8px}
.week-tab{padding:5px 13px;border-radius:6px;font-size:12px;font-weight:500;color:var(--slate);border:none;background:none;cursor:pointer;transition:all .15s;white-space:nowrap}
.week-tab.on{background:#fff;color:var(--navy);box-shadow:var(--sh-sm);font-weight:600}
.tpl-grid{flex:1;overflow:auto;display:flex;flex-direction:column}
.tpl-header{display:flex;flex-shrink:0;background:#fff;border-bottom:2px solid var(--border);position:sticky;top:0;z-index:10}
.tpl-header-label{width:200px;flex-shrink:0;padding:10px 14px;font-size:10.5px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.5px;border-right:1px solid var(--border);display:flex;align-items:center}
.tpl-header-days{flex:1;display:flex}
.tpl-day-hd{flex:1;padding:8px 10px;text-align:center;border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;gap:1px}
.tpl-day-hd:last-child{border-right:none}
.tpl-day-name{font-size:11px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.4px}
.tpl-day-date{font-family:var(--fm);font-size:10px;color:var(--slate);opacity:.6}
.tpl-rows{flex:1}
.tpl-row{display:flex;border-bottom:1px solid var(--border);min-height:80px}
.tpl-row:last-child{border-bottom:none}
.tpl-row-label{width:200px;flex-shrink:0;padding:10px 14px;border-right:1px solid var(--border);display:flex;flex-direction:column;justify-content:center;gap:3px;background:#fff;cursor:pointer;transition:background .1s}
.tpl-row-label:hover{background:var(--slate-l)}
.tpl-row-name{font-family:var(--fh);font-size:12.5px;font-weight:600;color:var(--navy)}
.tpl-row-sub{font-size:11px;color:var(--slate);display:flex;align-items:center;gap:4px}
.tpl-cell{flex:1;border-right:1px solid var(--border);padding:6px;display:flex;flex-direction:column;gap:4px;position:relative;cursor:pointer;transition:background .1s;min-width:0}
.tpl-cell:last-child{border-right:none}
.tpl-cell:hover{background:rgba(13,148,136,.03)}
.tpl-cell.has-slots{background:#fff}
.tpl-cell-add{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .15s;color:var(--teal);font-size:18px;font-weight:300}
.tpl-cell:hover .tpl-cell-add{opacity:.4}
.tpl-slot{border-radius:6px;padding:5px 7px;cursor:pointer;transition:all .15s;flex-shrink:0}
.tpl-slot:hover{filter:brightness(1.05);box-shadow:0 2px 6px rgba(0,0,0,.15)}
.tpl-slot-client{font-size:11px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tpl-slot-time{font-family:var(--fm);font-size:9.5px;opacity:.8;margin-top:1px}
.tpl-slot-svc{font-size:9px;opacity:.7;margin-top:1px}
.tpl-empty-cell{display:flex;align-items:center;justify-content:center;height:100%;min-height:68px}
.tpl-empty-hint{font-size:10.5px;color:var(--slate);opacity:0;transition:opacity .15s}
.tpl-cell:hover .tpl-empty-hint{opacity:.5}

/* SLOT DETAIL PANEL */
.slot-panel{width:280px;flex-shrink:0;background:#fff;border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;animation:slide-in-r .2s cubic-bezier(.22,1,.36,1)}
.sp-hd{padding:14px 16px;border-bottom:1px solid var(--border);position:relative}
.sp-hd-title{font-family:var(--fh);font-size:14px;font-weight:700;color:var(--navy);margin-bottom:2px}
.sp-hd-sub{font-size:11.5px;color:var(--slate)}
.sp-close{position:absolute;top:12px;right:14px;width:26px;height:26px;border-radius:6px;background:var(--slate-l);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--slate);font-size:14px;transition:all .15s}
.sp-close:hover{background:var(--border);color:var(--navy)}
.sp-body{flex:1;overflow-y:auto;padding:14px 16px}
.sp-row{padding:8px 0;border-bottom:1px solid var(--border);display:flex;gap:10px}
.sp-row:last-child{border-bottom:none}
.sp-label{font-size:11.5px;color:var(--slate);font-weight:500;width:90px;flex-shrink:0}
.sp-val{font-size:12.5px;color:var(--text)}
.sp-section{font-size:10px;font-weight:700;color:var(--slate);text-transform:uppercase;letter-spacing:.6px;padding:10px 0 5px}
.sp-actions{padding:12px 16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:7px}

/* GENERATE BANNER */
.gen-bar{background:var(--navy);color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.gen-bar-label{font-size:13px;font-weight:500}
.gen-bar-sub{font-size:11.5px;color:rgba(255,255,255,.55);margin-top:1px}
.gen-btn{background:var(--teal);color:#fff;border:none;border-radius:8px;padding:8px 18px;font-family:var(--fb);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.gen-btn:hover{background:#0a7d72}

/* TOAST */
.toast{position:fixed;bottom:22px;right:22px;background:var(--navy);color:#fff;padding:10px 16px;border-radius:9px;font-size:13px;font-weight:500;box-shadow:var(--sh-lg);z-index:999;display:flex;align-items:center;gap:8px;animation:toast-in .2s ease}
@keyframes toast-in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-corner{background:transparent}

@keyframes slide-in-r{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes fade-in{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}
.live-dot{width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s ease-in-out infinite}
/* ── ECM ── */
.ecm-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;background:var(--bg)}
.ecm-topbar{background:#fff;border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0;flex-wrap:wrap}
.ecm-title{font-family:var(--fh);font-size:18px;font-weight:800;color:var(--navy);letter-spacing:-.3px}
.ecm-live{display:flex;align-items:center;gap:6px;padding:4px 10px;background:var(--green-l);border:1px solid rgba(16,185,129,.3);border-radius:20px;font-size:11.5px;font-weight:700;color:#065F46}
.ecm-live-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s ease-in-out infinite}
.ecm-meta{font-size:12.5px;color:var(--slate);margin-left:2px}
.ecm-time{font-family:var(--fm);font-size:13px;font-weight:600;color:var(--navy);background:var(--slate-l);padding:4px 10px;border-radius:8px;margin-left:auto}
.ecm-filters{display:flex;gap:7px;align-items:center}

.ecm-kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:0;background:#fff;border-bottom:2px solid var(--border);flex-shrink:0}
.ecm-kpi{padding:16px 20px;display:flex;align-items:center;gap:14px;border-right:1px solid var(--border);cursor:pointer;transition:background .15s;position:relative}
.ecm-kpi:last-child{border-right:none}
.ecm-kpi:hover{background:var(--slate-l)}
.ecm-kpi.active-filter::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;border-radius:0}
.ecm-kpi-ico{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.ecm-kpi-val{font-family:var(--fh);font-size:28px;font-weight:800;line-height:1;letter-spacing:-.5px}
.ecm-kpi-label{font-size:11.5px;font-weight:600;color:var(--slate);text-transform:uppercase;letter-spacing:.4px;margin-top:2px}
.ecm-kpi-sub{font-size:11px;color:var(--slate);margin-top:1px}
.ecm-kpi.complete .ecm-kpi-ico{background:var(--green-l)}
.ecm-kpi.complete .ecm-kpi-val{color:var(--green)}
.ecm-kpi.complete.active-filter::after{background:var(--green)}
.ecm-kpi.late .ecm-kpi-ico{background:var(--amber-l)}
.ecm-kpi.late .ecm-kpi-val{color:var(--amber)}
.ecm-kpi.late.active-filter::after{background:var(--amber)}
.ecm-kpi.missed .ecm-kpi-ico{background:var(--red-l)}
.ecm-kpi.missed .ecm-kpi-val{color:var(--red)}
.ecm-kpi.missed.active-filter::after{background:var(--red)}

.ecm-board{flex:1;display:grid;grid-template-columns:1fr 1fr 1fr;overflow:hidden;border-top:none}
.ecm-col{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden}
.ecm-col:last-child{border-right:none}
.ecm-col-hd{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.ecm-col-title{font-family:var(--fh);font-size:13px;font-weight:700;display:flex;align-items:center;gap:8px}
.ecm-col-count{font-family:var(--fm);font-size:11px;font-weight:700;padding:2px 7px;border-radius:8px}
.ecm-col-body{flex:1;overflow-y:auto;padding:10px 10px 16px}
.ecm-col-body::-webkit-scrollbar{width:3px}
.ecm-col-body::-webkit-scrollbar-thumb{background:var(--border)}

.ecm-card{background:#fff;border-radius:12px;border:1.5px solid var(--border);margin-bottom:8px;overflow:hidden;transition:all .15s;cursor:pointer}
.ecm-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.08);transform:translateY(-1px)}
.ecm-card.complete{border-left:3px solid var(--green)}
.ecm-card.late{border-left:3px solid var(--amber);background:#FFFDF7}
.ecm-card.missed{border-left:3px solid var(--red);background:#FFF8F8}
.ecm-card.in-progress{border-left:3px solid var(--teal);background:var(--teal-l)}
.ecm-card-hd{padding:10px 12px 8px;display:flex;align-items:flex-start;gap:9px}
.ecm-card-av{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--fh);font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.ecm-card-client{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--navy);line-height:1.2}
.ecm-card-carer{font-size:11.5px;color:var(--slate);margin-top:2px}
.ecm-card-status-row{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-top:1px solid var(--border);background:rgba(0,0,0,.015)}
.ecm-time-display{font-family:var(--fm);font-size:11px;font-weight:600}
.ecm-badge{font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:5px}
.ecm-card-detail{padding:0 12px 10px;display:flex;gap:10px;flex-wrap:wrap}
.ecm-detail-item{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--slate)}

.ecm-in-progress-banner{margin:0 10px 8px;padding:8px 12px;background:var(--teal-l);border:1px solid var(--teal-m);border-radius:10px;display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--teal);font-weight:500;flex-shrink:0}

.ecm-empty-ico{font-size:32px;margin-bottom:8px;opacity:.4}
.ecm-empty-label{font-size:13px;font-weight:500;color:var(--slate)}

};

const ShiftBar = ({ shift, isDragging, dragX, onMouseDown, onClick }) => {
  const svc    = SVC_COLORS[shift.svc] || SVC_COLORS['Personal Care'];
  const isUnass = shift.status === 'unassigned';

  const baseLeft = timeToX(shift.start);
  const left = isDragging ? dragX : baseLeft;
  const width = Math.max(durationW(shift.start, shift.end) - 4, 30);

  const dur = durationMins(shift.start, shift.end);
  const showTime = width > 70;
  const showFull = width > 110;

  return (
    <div
      className={`shift-bar${isDragging ? ' dragging' : ''}${isUnass ? ' unassigned-bar' : ''}`}
      style={{
        left:    left + 2,
        width:   width,
        background: isUnass ? 'transparent' : svc.bg,
        borderColor: svc.bg,
        color:  isUnass ? svc.bg : svc.fg,
        boxShadow: isDragging ? '0 8px 24px rgba(0,0,0,.25)' : undefined,
      }}
      onMouseDown={e => { e.stopPropagation(); onMouseDown(e, shift); }}
      onClick={e  => { e.stopPropagation(); if(!isDragging) onClick(shift); }}
    >
      {showFull && (
        <div className="sb-svc-dot" style={{background: isUnass ? svc.bg : 'rgba(255,255,255,.5)', border: isUnass ? `2px solid ${svc.bg}` : 'none'}} />
      )}
      <span className="sb-client" style={{fontSize: width < 80 ? 10 : 11}}>
        {width < 60 ? '' : shift.client.split(' ').slice(-1)[0]}
        {showFull ? ` — ${shift.client.split(' ')[0]} ${shift.client.split(' ')[1]}`.replace(' — Mrs','').replace(' — Mr','').replace(' — Miss','') : ''}

      {showTime && (
        <span className="sb-time">{shift.start}</span>

    </div>
  );
};

// ── MAIN GANTT ────────────────────────────────────────────────────────────────
const Gantt = ({ activePage, setActivePage }) => {
  const [view,       setView]       = useState('rounds');  // rounds | staff | client
  const [date,       setDate]       = useState(new Date());
  const [shifts,     setShifts]     = useState(INIT_SHIFTS);
  const [selected,   setSelected]   = useState(null);
  const [dragState,  setDragState]  = useState(null);
  const [tooltip,    setTooltip]    = useState(null);
  const [zoneFilter, setZoneFilter] = useState('All');
  const ganttRef = useRef(null);

  // Advance date
  const prevDay = () => { const d = new Date(date); d.setDate(d.getDate()-1); setDate(d); };
  const nextDay = () => { const d = new Date(date); d.setDate(d.getDate()+1); setDate(d); };

  // Drag handlers
  const handleShiftMouseDown = useCallback((e, shift) => {
    e.preventDefault();
    const rect = e.currentTarget.closest('.gantt-row-track').getBoundingClientRect();
    const offsetX = e.clientX - rect.left - timeToX(shift.start);
    setDragState({
      shiftId: shift.id,
      offsetX,
      currentX: timeToX(shift.start),
      startTime: shift.start,
      newStart: shift.start,
    });
  }, []);

  const handleMouseMove = useCallback((e) => {
    if(!dragState) return;
    const track = ganttRef.current?.querySelector('.gantt-row-track');
    if(!track) return;
    const rect = track.getBoundingClientRect();
    const rawX = e.clientX - rect.left - dragState.offsetX;
    const clampedX = Math.max(0, Math.min(rawX, TOTAL_W - 40));
    const rawMins  = xToMins(clampedX);
    const snapped  = snapMins(rawMins);
    const snappedX = (snapped - START_HOUR * 60) / 60 * HOUR_W;
    setDragState(prev => ({...prev, currentX: snappedX, newStart: minsToTime(snapped)}));
    setTooltip({ x: e.clientX + 14, y: e.clientY - 10, time: minsToTime(snapped) });
  }, [dragState]);

  const handleMouseUp = useCallback(() => {
    if(!dragState) { setTooltip(null); return; }
    const shift = shifts.find(s => s.id === dragState.shiftId);
    if(shift && dragState.newStart !== shift.start) {
      const dur  = durationMins(shift.start, shift.end);
      const newS = dragState.newStart;
      const newE = minsToTime(timeToMins(newS) + dur);
      setShifts(prev => prev.map(s => s.id === shift.id ? {...s, start:newS, end:newE} : s));
    }
    setDragState(null);
    setTooltip(null);
  }, [dragState, shifts]);

  useEffect(() => {
    window.addEventListener('mouseup', handleMouseUp);
    window.addEventListener('mousemove', handleMouseMove);
    return () => {
      window.removeEventListener('mouseup', handleMouseUp);
      window.removeEventListener('mousemove', handleMouseMove);
    };
  }, [handleMouseUp, handleMouseMove]);

  const selectedShift = selected ? shifts.find(s => s.id === selected) : null;
  const selectedRound = selectedShift ? ROUNDS_DATA.find(r => r.id === selectedShift.roundId) : null;

  // Now line
  const nX = nowX();
  const showNow = nX >= 0 && nX <= TOTAL_W;

  // Filter zones
  const filteredRounds  = zoneFilter === 'All' ? ROUNDS_DATA : ROUNDS_DATA.filter(r => r.zone === zoneFilter);
  const filteredStaff   = zoneFilter === 'All' ? STAFF_ROWS_DATA : STAFF_ROWS_DATA.filter(r => r.zone === zoneFilter);
  const filteredClients = CLIENT_ROWS_DATA;

  return (
    <div className="app" onMouseMove={handleMouseMove}>
      <Sidebar active={activePage} setActive={setActivePage} />
      <div className="main">

        {/* Toolbar */}
        <div className="toolbar">
          <div className="toolbar-left">
            <div className="date-nav">
              <button className="date-nav-btn" onClick={prevDay}>&#8249;</button>
              <div className="date-nav-label">{formatDate(date)}</div>
              <button className="date-nav-btn" onClick={nextDay}>&#8250;</button>
            </div>
            <button className="btn btn-g btn-sm" onClick={() => setDate(new Date())}>Today</button>
            <div className="view-toggle">
              {[['rounds','Rounds'],['staff','Staff'],['client','Client']].map(([id,label]) => (
                <button key={id} className={`vt-btn${view===id?' on':''}`} onClick={() => setView(id)}>{label}</button>
              ))}
            </div>
            <select className="filter-sel" value={zoneFilter} onChange={e => setZoneFilter(e.target.value)}>
              {['All','North','Central','South'].map(z => <option key={z}>{z}{z!=='All'?' Zone':''}</option>)}
            </select>
          </div>
          <div className="toolbar-right">
            <div className="live-dot" title="Live" />
            <button className="btn btn-g btn-sm">+ Add shift</button>
            <button className="btn btn-g btn-sm">Draft (4)</button>
            <button className="btn publish-btn btn-sm">Publish rota</button>
          </div>
        </div>

        {/* Service legend */}
        <div className="svc-legend">
          {Object.entries(SVC_COLORS).map(([name, col]) => (
            <div key={name} className="svc-legend-item">
              <div className="svc-swatch" style={{background:col.bg}} />
              <span>{name}</span>
            </div>
          ))}
          <div className="svc-legend-item" style={{marginLeft:'auto'}}>
            <div className="svc-swatch" style={{background:'transparent',border:'1.5px dashed var(--slate)'}} />
            <span>Unassigned</span>
          </div>
        </div>

        {/* Gantt + panels */}
        <div className="gantt-wrap" ref={ganttRef}>
          <div className="gantt-scroll">
            {/* Time header */}
            <div className="gantt-header">
              <div className="gantt-header-label">
                {view==='rounds' ? 'Round / Carer' : view==='staff' ? 'Staff Member' : 'Client'}
              </div>
              <div className="gantt-header-times" style={{width: TOTAL_W, flexShrink:0}}>
                {HOURS.map(h => (
                  <div key={h} className={`time-cell${h%2===0?' major':''}`}
                    style={{width: HOUR_W, position:'absolute', left:(h-START_HOUR)*HOUR_W}}>
                    {String(h).padStart(2,'0')}:00
                  </div>
                ))}
              </div>
            </div>

            {/* Rows */}
            <div className="gantt-rows">
              {view === 'rounds' && filteredRounds.map(round => {
                const rowShifts = shifts.filter(s => s.roundId === round.id);
                const sc = {assigned:'green',unassigned:'red',partial:'partial'}[round.status]||'slate';
                return (
                  <GanttRow
                    key={round.id}
                    label={
                      <span style={{display:'flex',alignItems:'center',gap:6}}>
                        {round.name}
                        <span className={`tag t-${sc}`} style={{fontSize:9,padding:'1px 5px'}}>{round.status}</span>
                      </span>
                    }
                    sub={round.carer || 'No carer assigned'}
                    subColor={round.status === 'unassigned' ? null : round.carerColor}
                    dotColor={round.carerColor}
                    isUnassigned={round.status === 'unassigned'}
                    rowShifts={rowShifts}
                    dragState={dragState}
                    onShiftMouseDown={handleShiftMouseDown}
                    onShiftClick={id => setSelected(s => s===id?null:id)}
                    onRowMouseMove={handleMouseMove}
                    onRowMouseUp={handleMouseUp}
                  />
                );
              })}

              {view === 'staff' && filteredStaff.map(staff => {
                const rowShifts = shifts.filter(s => s.staffId === staff.id);
                return (
                  <GanttRow
                    key={staff.id}
                    label={staff.name}
                    sub={`${staff.role} · ${staff.zone}`}
                    dotColor={staff.color}
                    isUnassigned={false}
                    rowShifts={rowShifts}
                    dragState={dragState}
                    onShiftMouseDown={handleShiftMouseDown}
                    onShiftClick={id => setSelected(s => s===id?null:id)}
                    onRowMouseMove={handleMouseMove}
                    onRowMouseUp={handleMouseUp}
                  />
                );
              })}

              {view === 'client' && filteredClients.map(client => {
                const rowShifts = shifts.filter(s => s.clientId === client.id);
                return (
                  <GanttRow
                    key={client.id}
                    label={client.name}
                    sub={`${client.zone} Zone · ${client.svc}`}
                    dotColor={SVC_COLORS[client.svc]?.bg}
                    isUnassigned={false}
                    rowShifts={rowShifts}
                    dragState={dragState}
                    onShiftMouseDown={handleShiftMouseDown}
                    onShiftClick={id => setSelected(s => s===id?null:id)}
                    onRowMouseMove={handleMouseMove}
                    onRowMouseUp={handleMouseUp}
                  />
                );
              })}

              {/* Now line overlay */}
              {showNow && (
                <div style={{position:'absolute',top:0,bottom:0,left:220+nX,width:2,background:'var(--red)',opacity:.6,pointerEvents:'none',zIndex:10}}>
                  <div style={{position:'absolute',top:0,left:-4,width:10,height:10,background:'var(--red)',borderRadius:'50%',opacity:.8}} />
                </div>
              )}
            </div>
          </div>

          {/* Unassigned panel */}
          <UnassignedPanel visits={UNASSIGNED_VISITS} />

          {/* Detail panel */}
          {selectedShift && (
            <DetailPanel
              shift={selectedShift}
              round={selectedRound}
              onClose={() => setSelected(null)}
            />
          )}
        </div>
      </div>

      {/* Drag tooltip */}
      {tooltip && dragState && (
        <div className="drag-tooltip" style={{left: tooltip.x, top: tooltip.y}}>
          {tooltip.time}
        </div>
      )}
    </div>
  );
};

// ── ECM COMPONENT ─────────────────────────────────────────────────────────────
const ECMPage = () => {
  const [filter, setFilter]   = useState('all');
  const [selId,  setSelId]    = useState(null);
  const [clock,  setClock]    = useState(new Date());

  React.useEffect(() => {
    const t = setInterval(() => setClock(new Date()), 30000);
    return () => clearInterval(t);
  }, []);

  const timeStr = `${String(clock.getHours()).padStart(2,'0')}:${String(clock.getMinutes()).padStart(2,'0')}`;

  const complete    = ECM_CALLS.filter(c => c.status==='complete' || c.status==='in-progress');
  const inProgress  = ECM_CALLS.filter(c => c.status==='in-progress');
  const late        = ECM_CALLS.filter(c => c.status==='late');
  const missed      = ECM_CALLS.filter(c => c.status==='missed');

  const cols = [
    { id:'complete', label:'Calls Complete', count:complete.length, color:'var(--green)', bgColor:'var(--green-l)', ico:'✓', calls:complete },
    { id:'late',     label:'Late / Running', count:late.length,     color:'var(--amber)', bgColor:'var(--amber-l)', ico:'⏱', calls:late     },
    { id:'missed',   label:'Missed',         count:missed.length,   color:'var(--red)',   bgColor:'var(--red-l)',   ico:'!', calls:missed   },
  ];

  const EcmCard = ({ call }) => {
    const isSelected = selId === call.id;
    const svcCol = SVC_COLORS[call.svc]||'#64748B';
    const statusClass = call.status==='in-progress' ? 'in-progress' : call.status;

    return (
      <div className={`ecm-card ${statusClass}`} onClick={() => setSelId(s => s===call.id ? null : call.id)}>
        <div className="ecm-card-hd">
          <div className="ecm-card-av" style={{background:call.carerColor}}>{inits2(call.carer)}</div>
          <div style={{flex:1,minWidth:0}}>
            <div className="ecm-card-client">{call.client}</div>
            <div className="ecm-card-carer">{call.carer} · {call.zone} Zone</div>
          </div>
          <div style={{textAlign:'right',flexShrink:0}}>
            <div style={{fontFamily:'var(--fm)',fontSize:'12px',fontWeight:600,color:'var(--navy)'}}>{call.sched}</div>
            <div style={{fontFamily:'var(--fm)',fontSize:'10px',color:'var(--slate)'}}>{call.schedEnd}</div>
          </div>
        </div>
        <div className="ecm-card-detail">
          <div className="ecm-detail-item">
            <div style={{width:8,height:8,borderRadius:2,background:svcCol,flexShrink:0}}/>
            {call.svc}
          </div>
          {call.signIn && (
            <div className="ecm-detail-item">
              🟢 In: <strong style={{fontFamily:'var(--fm)',marginLeft:2}}>{call.signIn}</strong>
            </div>
          )}
          {call.signOut && (
            <div className="ecm-detail-item">
              🔴 Out: <strong style={{fontFamily:'var(--fm)',marginLeft:2}}>{call.signOut}</strong>
            </div>
          )}
          {call.dur && (
            <div className="ecm-detail-item">
              ⏱ <strong style={{fontFamily:'var(--fm)',marginLeft:2}}>{call.dur}min</strong>
            </div>
          )}
          {call.lateBy && (
            <div className="ecm-detail-item" style={{color:'var(--amber)',fontWeight:600}}>
              ⚠ {call.signIn ? `Started ${call.lateBy}min late` : `${call.lateBy}min overdue, not signed in`}
            </div>
          )}
        </div>

        {/* Expanded detail */}
        {isSelected && (
          <div style={{padding:'10px 12px',background:'var(--slate-l)',borderTop:'1px solid var(--border)'}}>
            {[
              ['Key safe',       call.keyCode],
              ['Scheduled',      `${call.sched} – ${call.schedEnd}`],
              ['Signed in',      call.signIn || '—'],
              ['Signed out',     call.signOut || (call.status==='in-progress'?'In progress…':'Not yet')],
              ['Duration',       call.dur ? `${call.dur} min` : '—'],
              ...(call.missReason ? [['Reason', call.missReason]] : []),
            ].map(([l,v]) => (
              <div key={l} style={{display:'flex',justifyContent:'space-between',padding:'4px 0',borderBottom:'1px solid var(--border)',fontSize:'12px'}}>
                <span style={{color:'var(--slate)',fontWeight:500}}>{l}</span>
                <span style={{fontFamily:l==='Key safe'||l==='Signed in'||l==='Signed out'?'var(--fm)':undefined,color:'var(--navy)',fontWeight:500,textAlign:'right',maxWidth:180}}>{v}</span>
              </div>
            ))}
            <div style={{display:'flex',gap:6,marginTop:10}}>
              {call.status==='missed' && (
                <button className="btn btn-g btn-sm" style={{flex:1,justifyContent:'center',fontSize:11.5}}>📞 Call carer</button>
              )}
              {(call.status==='late'||call.status==='missed') && (
                <button className="btn btn-g btn-sm" style={{flex:1,justifyContent:'center',fontSize:11.5}}>🔁 Arrange cover</button>
              )}
              {call.status==='in-progress' && (
                <button className="btn btn-g btn-sm" style={{flex:1,justifyContent:'center',fontSize:11.5}}>📞 Welfare check</button>
              )}
              <button className="btn btn-g btn-sm" style={{flex:1,justifyContent:'center',fontSize:11.5}}>📋 View client</button>
            </div>
          </div>
        )}

        <div className="ecm-card-status-row">
          <div className="ecm-time-display" style={{color:
            call.status==='complete'?'var(--green)':
            call.status==='in-progress'?'var(--teal)':
            call.status==='late'?'var(--amber)':'var(--red)'}}>
            {call.status==='complete'   ? `✓ Done ${call.signOut}` :
             call.status==='in-progress'? '● Active now' :
             call.status==='late'       ? `⏱ ${call.lateBy}min late` :
             '✕ Missed'}
          </div>
          <span className="ecm-badge" style={{
            background:
              call.status==='complete'?'var(--green-l)':
              call.status==='in-progress'?'var(--teal-l)':
              call.status==='late'?'var(--amber-l)':'var(--red-l)',
            color:
              call.status==='complete'?'#065F46':
              call.status==='in-progress'?'var(--teal)':
              call.status==='late'?'#92400E':'var(--red)',
          }}>
            {call.svc.split(' ')[0]}
          </span>
        </div>
      </div>
    );
  };

  return (
    <div className="ecm-wrap">
      {/* Top bar */}
      <div className="ecm-topbar">
        <div>
          <div className="ecm-title">Call Monitoring</div>
          <div className="ecm-meta">Today · {ECM_CALLS.length} calls scheduled · Aber Care North, Central, South</div>
        </div>
        <div className="ecm-live">
          <div className="ecm-live-dot"/>
          Live
        </div>
        <div className="ecm-time">{timeStr}</div>
        <div className="ecm-filters" style={{marginLeft:8}}>
          <select className="filter-sel" style={{fontSize:'12px',height:32}}>
            <option>All zones</option>
            <option>North</option>
            <option>Central</option>
            <option>South</option>
          </select>
          <select className="filter-sel" style={{fontSize:'12px',height:32}}>
            <option>All carers</option>
            <option>Emma Williams</option>
            <option>Lisa Roberts</option>
            <option>Rebecca Evans</option>
            <option>Sion Parry</option>
          </select>
        </div>
      </div>

      {/* KPI strip */}
      <div className="ecm-kpi-row">
        {[
          { id:'complete', cls:'complete', ico:'✓', label:'Calls Complete', val:complete.length, sub:`${inProgress.length} in progress now`, filt:'complete' },
          { id:'late',     cls:'late',     ico:'⏱', label:'Late / Running', val:late.length,     sub:'Not yet signed in or overdue', filt:'late' },
          { id:'missed',   cls:'missed',   ico:'✕', label:'Missed',         val:missed.length,   sub:'No sign-in recorded — action needed', filt:'missed' },
        ].map(k => (
          <div key={k.id} className={`ecm-kpi ${k.cls}${filter===k.filt?' active-filter':''}`}
            onClick={() => setFilter(f => f===k.filt ? 'all' : k.filt)}>
            <div className="ecm-kpi-ico" style={{fontSize:22}}>{k.ico}</div>
            <div>
              <div className="ecm-kpi-val">{k.val}</div>
              <div className="ecm-kpi-label">{k.label}</div>
              <div className="ecm-kpi-sub">{k.sub}</div>
            </div>
          </div>
        ))}
      </div>

      {/* In-progress banner */}
      {inProgress.length > 0 && (
        <div className="ecm-in-progress-banner">
          <div className="live" style={{width:8,height:8}}/>
          <span><strong>{inProgress.length} call{inProgress.length>1?'s':''} in progress:</strong> {inProgress.map(c=>c.carer.split(' ')[0]).join(', ')} · Signed in, visit ongoing</span>
        </div>
      )}

      {/* Three-column board */}
      <div className="ecm-board">
        {cols.map(col => {
          const visible = filter==='all' ? col.calls : filter===col.id ? col.calls : [];
          const isFiltered = filter!=='all' && filter!==col.id;
          return (
            <div key={col.id} className="ecm-col">
              <div className="ecm-col-hd">
                <div className="ecm-col-title" style={{color:col.color}}>
                  <span style={{width:22,height:22,borderRadius:7,background:col.bgColor,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,flexShrink:0}}>
                    {col.ico}
                  </span>
                  {col.label}
                </div>
                <span className="ecm-col-count" style={{background:col.bgColor,color:col.color}}>
                  {col.count}
                </span>
              </div>
              <div className="ecm-col-body">
                {isFiltered ? (
                  <div className="ecm-empty">
                    <div className="ecm-empty-ico">🔍</div>
                    <div className="ecm-empty-label">Filtered out</div>
                  </div>
                ) : visible.length === 0 ? (
                  <div className="ecm-empty">
                    <div className="ecm-empty-ico">
                      {col.id==='complete'?'✓':col.id==='late'?'⏱':'✕'}
                    </div>
                    <div className="ecm-empty-label">
                      {col.id==='missed' ? 'No missed calls ✓' : col.id==='late' ? 'All calls on time' : 'No completed calls yet'}
                    </div>
                  </div>
                ) : (
                  visible.map(call => <EcmCard key={call.id} call={call}/>)
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ── APP ────────────────────────────────────────────────────────────────────────
const App = () => {
  const [activePage, setActivePage] = useState('day');
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);

  const showToast = msg => {
    setToast(msg);
    clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 3000);
  };

  const handleGenerate = () => {
    showToast('Week generated — 16 draft shifts created. Review in Day View.');
    setActivePage('day');
  };

  const needsGantt = activePage === 'day';

  return (
    <>
      <Nav />
      {needsGantt
        ? <Gantt activePage={activePage} setActivePage={setActivePage} />
        : (
          <PageWrap activePage={activePage} setActivePage={setActivePage}>
            {activePage === 'ecm'        && <ECMPage />}
            {activePage === 'templates'  && <TemplatesView onGenerate={handleGenerate} />}
            {activePage === 'week'       && <WeekView />}
            {activePage === 'rounds-b'   && <RoundsBuilder />}
            {activePage === 'unassigned' && <UnassignedPage />}
            {activePage === 'rules'      && <RosterRules />}
            {activePage === 'colours'    && <ServiceColours />}
          </PageWrap>
        )
      }
      {toast && <div className="toast">✓ {toast}</div>}
    </>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
