<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0D1F3C">
<title>CareFlow — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0D1F3C;--teal:#0D9488;--teal-l:#F0FDFA;--teal-m:#CCFBF1;
  --slate:#64748B;--slate-l:#F1F5F9;--border:#E2E8F0;
  --red:#DC2626;--red-l:#FEF2F2;--green:#10B981;--green-l:#F0FDF4;
  --bg:#F8FAFC;--text:#1E293B;
  --fh:'Outfit',sans-serif;--fb:'DM Sans',sans-serif;
}
html,body{height:100%;-webkit-font-smoothing:antialiased}
body{font-family:var(--fb);background:var(--navy);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}

/* Animated background */
.bg-mesh{position:fixed;inset:0;z-index:0;overflow:hidden}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:.35;animation:drift 12s ease-in-out infinite}
.orb1{width:500px;height:500px;background:var(--teal);top:-100px;right:-100px;animation-delay:0s}
.orb2{width:400px;height:400px;background:#1e3a6e;bottom:-80px;left:-80px;animation-delay:-4s}
.orb3{width:300px;height:300px;background:#0a5c52;top:40%;left:30%;animation-delay:-8s}
@keyframes drift{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(20px,-15px) scale(1.05)}66%{transform:translate(-10px,20px) scale(.97)}}

/* Grid pattern overlay */
.bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px}

/* Card */
.login-wrap{position:relative;z-index:10;width:100%;max-width:440px;padding:20px}
.login-card{background:rgba(255,255,255,.97);border-radius:20px;padding:36px 36px 32px;box-shadow:0 24px 64px rgba(0,0,0,.35),0 0 0 1px rgba(255,255,255,.08)}

/* Logo */
.logo-row{display:flex;align-items:center;gap:10px;margin-bottom:32px}
.logo-mark{width:40px;height:40px;border-radius:11px;background:var(--navy);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-mark svg{width:22px;height:22px}
.logo-name{font-family:var(--fh);font-size:22px;font-weight:800;color:var(--navy);letter-spacing:-.5px}
.logo-reg{font-size:10px;font-weight:700;color:var(--teal);text-transform:uppercase;letter-spacing:.8px;margin-top:1px}

/* Headings */
.login-title{font-family:var(--fh);font-size:24px;font-weight:800;color:var(--navy);letter-spacing:-.4px;margin-bottom:6px}
.login-sub{font-size:14px;color:var(--slate);margin-bottom:28px;line-height:1.5}

/* Role toggle */
.role-row{display:flex;gap:8px;margin-bottom:22px}
.role-btn{flex:1;padding:13px 10px;border-radius:12px;border:2px solid var(--border);background:#fff;cursor:pointer;text-align:center;transition:all .2s;position:relative}
.role-btn.on{border-color:var(--navy);background:var(--navy)}
.role-btn:not(.on):hover{border-color:var(--teal);background:var(--teal-l)}
.role-ico{font-size:22px;margin-bottom:5px;display:block}
.role-label{font-family:var(--fh);font-size:13px;font-weight:700;color:var(--slate)}
.role-btn.on .role-label{color:#fff}
.role-sub{font-size:11px;color:var(--slate);margin-top:2px}
.role-btn.on .role-sub{color:rgba(255,255,255,.55)}
.role-check{position:absolute;top:8px;right:8px;width:18px;height:18px;border-radius:50%;background:var(--teal);display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700;opacity:0;transition:opacity .2s}
.role-btn.on .role-check{opacity:1}

/* Form */
.field{margin-bottom:16px}
.field-label{font-size:12px;font-weight:700;color:var(--navy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:block}
.field-input{width:100%;padding:13px 16px;border-radius:12px;border:1.5px solid var(--border);background:#fff;font-family:var(--fb);font-size:15px;color:var(--text);outline:none;transition:border-color .15s}
.field-input:focus{border-color:var(--teal)}
.field-input::placeholder{color:#b0bac9}
.field-input.err{border-color:var(--red)}
.field-err{font-size:12px;color:var(--red);margin-top:4px}

/* Demo credentials */
.demo-box{background:var(--teal-l);border:1px solid var(--teal-m);border-radius:10px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:flex-start;gap:10px}
.demo-label{font-size:11.5px;font-weight:700;color:var(--teal);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.demo-cred{font-size:12.5px;color:var(--teal)}

/* Submit */
.submit-btn{width:100%;padding:15px;border-radius:13px;border:none;background:var(--navy);color:#fff;font-family:var(--fh);font-size:16px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;letter-spacing:-.2px;margin-top:4px}
.submit-btn:hover{background:#162d54;transform:translateY(-1px);box-shadow:0 8px 20px rgba(13,31,60,.3)}
.submit-btn:active{transform:translateY(0);box-shadow:none}
.submit-btn:disabled{opacity:.5;cursor:default;transform:none;box-shadow:none}
.submit-btn.loading{pointer-events:none}

/* Spinner */
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Links */
.link-row{display:flex;align-items:center;justify-content:space-between;margin-top:14px}
.text-link{font-size:13px;color:var(--teal);font-weight:500;cursor:pointer;text-decoration:none;background:none;border:none;transition:color .15s}
.text-link:hover{color:#0a7d72}

/* Divider */
.divider{display:flex;align-items:center;gap:12px;margin:18px 0}
.divider-line{flex:1;height:1px;background:var(--border)}
.divider-label{font-size:12px;color:var(--slate);white-space:nowrap}

/* New org */
.new-org-btn{width:100%;padding:13px;border-radius:13px;border:1.5px solid var(--border);background:#fff;font-family:var(--fh);font-size:14px;font-weight:600;color:var(--navy);cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:7px}
.new-org-btn:hover{border-color:var(--teal);background:var(--teal-l);color:var(--teal)}

/* Footer */
.login-footer{text-align:center;margin-top:22px;font-size:12px;color:rgba(255,255,255,.3)}
.login-footer a{color:rgba(255,255,255,.4);text-decoration:none}
.login-footer a:hover{color:rgba(255,255,255,.6)}

/* Regulators strip */
.reg-strip{display:flex;align-items:center;justify-content:center;gap:14px;margin-top:6px;padding-top:18px;border-top:1px solid var(--border)}
.reg-badge{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--slate)}
.reg-icon{width:16px;height:16px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:#fff;flex-shrink:0}

/* Success state */
.success-state{text-align:center;padding:10px 0}
.success-tick{width:64px;height:64px;border-radius:50%;background:var(--green-l);border:2px solid var(--green);display:flex;align-items:center;justify-content:center;font-size:28px;margin:0 auto 16px;animation:pop .4s cubic-bezier(.22,1,.36,1)}
@keyframes pop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
.success-title{font-family:var(--fh);font-size:20px;font-weight:800;color:var(--navy);margin-bottom:6px}
.success-sub{font-size:14px;color:var(--slate);line-height:1.5;margin-bottom:20px}
.routing-indicator{background:var(--slate-l);border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:10px;margin-bottom:20px}
.routing-text{font-size:13.5px;color:var(--navy);font-weight:500}
.routing-sub{font-size:12px;color:var(--slate);margin-top:1px}

@keyframes fade-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fade-in .3s ease forwards}
</style>
</head>
<body>
<div class="bg-mesh">
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>
  <div class="bg-orb orb3"></div>
</div>
<div class="bg-grid"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const DESKTOP = 'CareFlow_Prototype_v3.html';
const MOBILE  = 'CareFlow_Mobile.html';
const SETUP   = 'CareFlow_Setup.html';

const DEMO_ACCOUNTS = [
  { role:'coordinator', email:'cameron@abercare.co.uk',  password:'careflow2026', name:'Cameron D',    org:'Aber Care Services Ltd', dest:DESKTOP },
  { role:'manager',     email:'manager@abercare.co.uk',  password:'careflow2026', name:'Sian M',        org:'Aber Care Services Ltd', dest:DESKTOP },
  { role:'carer',       email:'emma@abercare.co.uk',     password:'careflow2026', name:'Emma Williams', org:'Aber Care Services Ltd', dest:MOBILE  },
];

const LogoMark = () => (
  <svg viewBox="0 0 22 22" fill="none">
    <rect x="1" y="1"  width="9" height="9" rx="2.5" fill="white" opacity=".9"/>
    <rect x="12" y="1"  width="9" height="9" rx="2.5" fill="white" opacity=".6"/>
    <rect x="1" y="12" width="9" height="9" rx="2.5" fill="white" opacity=".6"/>
    <rect x="12" y="12" width="9" height="9" rx="2.5" fill="white" opacity=".3"/>
  </svg>
);

const App = () => {
  const [role,     setRole]     = useState('coordinator');
  const [email,    setEmail]    = useState('');
  const [password, setPassword] = useState('');
  const [loading,  setLoading]  = useState(false);
  const [error,    setError]    = useState('');
  const [success,  setSuccess]  = useState(null);
  const [showPw,   setShowPw]   = useState(false);
  const emailRef = useRef(null);

  const ROLES = [
    { id:'coordinator', ico:'🖥️',  label:'Coordinator',  sub:'Desktop dashboard' },
    { id:'carer',       ico:'📱',  label:'Care Worker',  sub:'Mobile app'         },
  ];

  const demoForRole = r => DEMO_ACCOUNTS.find(a => a.role === r);
  const demo = demoForRole(role);

  const handleRoleSwitch = r => {
    setRole(r);
    setEmail('');
    setPassword('');
    setError('');
  };

  const handleFillDemo = () => {
    if(demo) { setEmail(demo.email); setPassword(demo.password); setError(''); }
  };

  const handleSubmit = () => {
    setError('');
    if(!email.trim()) { setError('Please enter your email address'); return; }
    if(!password)     { setError('Please enter your password'); return; }

    setLoading(true);
    setTimeout(() => {
      const match = DEMO_ACCOUNTS.find(a => a.email===email.trim().toLowerCase() && a.password===password);
      if(match) {
        setLoading(false);
        setSuccess(match);
        setTimeout(() => { window.location.href = match.dest; }, 2200);
      } else {
        setLoading(false);
        setError('Incorrect email or password. Use the demo credentials below.');
      }
    }, 1200);
  };

  const handleKeyDown = e => { if(e.key==='Enter') handleSubmit(); };

  if(success) return (
    <div className="login-wrap fade-in">
      <div className="login-card">
        <div className="success-state">
          <div className="success-tick">✓</div>
          <div className="success-title">Welcome back, {success.name.split(' ')[0]}</div>
          <div className="success-sub">{success.org}</div>
          <div className="routing-indicator">
            <div style={{fontSize:22,flexShrink:0}}>{success.role==='carer'?'📱':'🖥️'}</div>
            <div>
              <div className="routing-text">Opening {success.role==='carer'?'CareFlow Mobile':'CareFlow Desktop'}</div>
              <div className="routing-sub">{success.role==='carer'?'Care worker view — today\'s visits':'Coordinator dashboard'}</div>
            </div>
            <div className="spinner" style={{marginLeft:'auto',borderTopColor:'var(--teal)',border:'2px solid var(--teal-m)'}}/>
          </div>
        </div>
      </div>
      <div className="login-footer">
        <span>If you are not redirected, </span>
        <a href={success.dest}>click here</a>
      </div>
    </div>
  );

  return (
    <div className="login-wrap">
      <div className="login-card">
        {/* Logo */}
        <div className="logo-row">
          <div className="logo-mark"><LogoMark/></div>
          <div>
            <div className="logo-name">CareFlow</div>
            <div className="logo-reg">CQC &amp; CIW Regulated</div>
          </div>
        </div>

        <div className="login-title">Sign in</div>
        <div className="login-sub">Select your role, then sign in with your account.</div>

        {/* Role toggle */}
        <div className="role-row">
          {ROLES.map(r => (
            <div key={r.id} className={`role-btn${role===r.id?' on':''}`} onClick={() => handleRoleSwitch(r.id)}>
              <div className="role-check">✓</div>
              <span className="role-ico">{r.ico}</span>
              <div className="role-label">{r.label}</div>
              <div className="role-sub">{r.sub}</div>
            </div>
          ))}
        </div>

        {/* Demo credentials box */}
        <div className="demo-box" style={{cursor:'pointer'}} onClick={handleFillDemo}>
          <div style={{fontSize:18,flexShrink:0}}>💡</div>
          <div>
            <div className="demo-label">Demo account — tap to fill</div>
            <div className="demo-cred">📧 {demo?.email}</div>
            <div className="demo-cred">🔑 {demo?.password}</div>
          </div>
        </div>

        {/* Fields */}
        <div className="field">
          <label className="field-label">Email address</label>
          <input
            ref={emailRef}
            className={`field-input${error&&!email?' err':''}`}
            type="email"
            placeholder="your@email.co.uk"
            value={email}
            onChange={e => { setEmail(e.target.value); setError(''); }}
            onKeyDown={handleKeyDown}
            autoComplete="email"
          />
        </div>
        <div className="field">
          <label className="field-label">Password</label>
          <div style={{position:'relative'}}>
            <input
              className={`field-input${error&&!password?' err':''}`}
              type={showPw?'text':'password'}
              placeholder="Enter your password"
              value={password}
              onChange={e => { setPassword(e.target.value); setError(''); }}
              onKeyDown={handleKeyDown}
              autoComplete="current-password"
              style={{paddingRight:44}}
            />
            <button onClick={() => setShowPw(p => !p)} style={{position:'absolute',right:13,top:'50%',transform:'translateY(-50%)',background:'none',border:'none',cursor:'pointer',color:'var(--slate)',fontSize:16,padding:2}}>
              {showPw ? '🙈' : '👁'}
            </button>
          </div>
        </div>

        {error && <div className="field-err" style={{marginBottom:12,display:'flex',gap:5,alignItems:'center'}}><span>⚠</span>{error}</div>}

        <button className={`submit-btn${loading?' loading':''}`} onClick={handleSubmit} disabled={loading}>
          {loading ? <><div className="spinner"/><span>Signing in...</span></> : <>Sign in →</>}
        </button>

        <div className="link-row">
          <button className="text-link">Forgot password?</button>
          <button className="text-link">Need help?</button>
        </div>

        <div className="divider">
          <div className="divider-line"/>
          <span className="divider-label">New to CareFlow?</span>
          <div className="divider-line"/>
        </div>

        <button className="new-org-btn" onClick={() => window.location.href=SETUP}>
          ✦ Set up your organisation
        </button>

        {/* Regulator badges */}
        <div className="reg-strip">
          {[['CQC','#DA3754'],['CIW','#0069A8'],['ICO','#2B4490'],['ISO','#2B7A3A']].map(([label,col]) => (
            <div key={label} className="reg-badge">
              <div className="reg-icon" style={{background:col}}>{label.slice(0,2)}</div>
              {label}
            </div>
          ))}
          <div className="reg-badge">
            <div className="reg-icon" style={{background:'#1a1a2e',fontSize:8}}>CE</div>
            Cyber Essentials
          </div>
        </div>
      </div>

      <div className="login-footer">
        <span>© 2026 CareFlow · </span>
        <a href="#">Privacy</a>
        <span> · </span>
        <a href="#">Terms</a>
        <span> · </span>
        <a href="#">Security</a>
        <span> · </span>
        <a href="#">Status</a>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
